<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Реестр компаний | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }

        /* Анимация шкалы таймера */
        @keyframes fillProgress { 0% { width: 100%; } 100% { width: 0%; } }
        .progress-bar { animation: fillProgress 5s linear forwards; }

        .company-row:hover { background-color: #FFFDFD; }
    </style>
</head>
<body class="flex">

<!-- БОКОВОЕ МЕНЮ -->
<aside class="w-64 h-screen bg-[#1E3A8A] text-white fixed p-8 flex flex-col shadow-2xl z-50">
    <div class="mb-12">
        <h1 class="text-3xl font-extrabold leading-tight">Logistics <br/><span class="text-[#D4652F]">Admin</span></h1>
    </div>
    <nav class="space-y-3 flex-1">
        <a href="/admin/dashboard" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium">📊 Обзор системы</a>
        <a href="/admin/companies" class="block py-3 px-5 bg-[#D4652F] rounded-2xl text-sm font-bold text-white shadow-lg shadow-[#D4652F]/30 transition-transform hover:scale-105">🏢 Реестр компаний</a>
        <a href="/admin/categories" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium">🏷️ Классификатор</a>
    </nav>
    <div class="pt-8 border-t border-blue-800/50">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-left py-3 px-5 text-red-300 text-xs font-black uppercase tracking-widest hover:text-white hover:bg-red-500/20 rounded-xl transition">
                Выйти из системы
            </button>
        </form>
    </div>
</aside>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<main class="ml-64 p-12 w-full max-w-7xl mx-auto">
    <header class="mb-12 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black text-stone-900 tracking-tight">Реестр компаний</h2>
            <p class="text-stone-400 mt-2 font-medium">Модерация и управление участниками системы</p>
        </div>

        <div th:if="${param.deleted}" class="px-6 py-2 bg-green-50 text-green-700 border border-green-200 rounded-2xl text-sm font-bold animate-pulse">
            Компания успешно удалена
        </div>
    </header>

    <div class="bg-white rounded-[3rem] border border-stone-100 shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-stone-50 border-b border-stone-100">
            <tr>
                <th class="px-10 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Компания</th>
                <th class="px-10 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Сфера бизнеса</th>
                <th class="px-10 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Владелец</th>
                <th class="px-10 py-6 text-right text-[10px] font-black uppercase tracking-widest text-stone-400">Действия</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-stone-50">
            <tr th:each="comp : ${companies}" class="company-row transition-colors duration-300 group">
                <td class="px-10 py-6">
                    <div class="flex items-center space-x-4">
                        <img th:if="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}" th:src="${comp.logoUrl}" class="w-12 h-12 rounded-2xl object-cover border border-stone-100 shadow-sm">
                        <div th:unless="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}"
                             class="w-12 h-12 rounded-2xl bg-stone-100 text-stone-600 flex items-center justify-center font-black text-xl border border-stone-200 uppercase"
                             th:text="${comp.name.substring(0,1)}"></div>
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">ID: [[${comp.id}]]</span>
                            <span class="font-bold text-stone-900 text-lg group-hover:text-[#D4652F] transition-colors" th:text="${comp.name}"></span>
                        </div>
                    </div>
                </td>

                <td class="px-10 py-6">
                        <span th:if="${comp.type != null && comp.type.name() == 'SUPPLIER'}"
                              class="text-[#1E3A8A] bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Поставщик</span>
                    <span th:if="${comp.type != null && comp.type.name() == 'CUSTOMER'}"
                          class="text-[#D4652F] bg-orange-50 border border-orange-100 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Заказчик</span>
                </td>

                <td class="px-10 py-6 text-sm font-medium text-stone-600" th:text="${comp.owner != null ? comp.owner.email : 'Системная запись'}"></td>

                <td class="px-10 py-6 text-right">
                    <!-- ФОРМА УДАЛЕНИЯ С ТАЙМЕРОМ -->
                    <form th:action="@{/admin/companies/delete/{id}(id=${comp.id})}" method="post" th:id="'deleteForm-' + ${comp.id}" class="inline-block relative">

                        <!-- Исходная кнопка -->
                        <button type="button" th:id="'btnInit-' + ${comp.id}" th:onclick="'startTimer(' + ${comp.id} + ')'"
                                class="text-red-400 hover:text-white border border-red-200 hover:bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                            Удалить
                        </button>

                        <!-- Кнопка таймера (скрыта) -->
                        <div th:id="'btnTimer-' + ${comp.id}"
                             class="hidden relative overflow-hidden h-9 bg-red-600 text-white px-4 rounded-xl cursor-pointer group shadow-lg min-w-[120px]"
                             th:onclick="'stopTimer(' + ${comp.id} + ')'">
                            <div th:id="'progressLine-' + ${comp.id}" class="absolute top-0 left-0 h-full bg-red-800 z-0"></div>
                            <span class="relative z-10 h-full flex items-center justify-center group-hover:hidden text-[9px] font-black uppercase tracking-widest">
                                    Отмена <span th:id="'timerText-' + ${comp.id}" class="ml-1 text-xs">5</span>
                                </span>
                            <span class="relative z-10 h-full items-center justify-center hidden group-hover:flex text-[9px] font-black uppercase tracking-widest">
                                    Прервать
                                </span>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${companies.isEmpty()}" class="py-24 text-center">
            <p class="text-stone-400 font-medium">Список компаний пуст</p>
        </div>
    </div>
</main>

<script>
    const timers = {};
    const intervals = {};

    function startTimer(id) {
        const btnInit = document.getElementById('btnInit-' + id);
        const btnTimer = document.getElementById('btnTimer-' + id);
        const timerText = document.getElementById('timerText-' + id);
        const progressLine = document.getElementById('progressLine-' + id);
        const form = document.getElementById('deleteForm-' + id);

        let timeLeft = 5;

        btnInit.classList.add('hidden');
        btnTimer.classList.remove('hidden');
        btnTimer.classList.add('flex');

        progressLine.classList.add('progress-bar');

        intervals[id] = setInterval(() => {
            timeLeft -= 1;
            timerText.innerText = timeLeft;
        }, 1000);

        timers[id] = setTimeout(() => {
            clearInterval(intervals[id]);
            form.submit();
        }, 5000);
    }

    function stopTimer(id) {
        const btnInit = document.getElementById('btnInit-' + id);
        const btnTimer = document.getElementById('btnTimer-' + id);
        const timerText = document.getElementById('timerText-' + id);
        const progressLine = document.getElementById('progressLine-' + id);

        clearTimeout(timers[id]);
        clearInterval(intervals[id]);

        progressLine.classList.remove('progress-bar');
        timerText.innerText = '5';

        btnTimer.classList.add('hidden');
        btnTimer.classList.remove('flex');
        btnInit.classList.remove('hidden');
    }
</script>

</body>
</html>
