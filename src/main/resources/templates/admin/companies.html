<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Реестр компаний | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        @keyframes fillProgress { 0% { width: 100%; } 100% { width: 0%; } }
        .progress-bar { animation: fillProgress 5s linear forwards; }
        .input-focus:focus { border-color: #D4652F; box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1); }
    </style>
</head>
<body class="flex">

<!-- БОКОВОЕ МЕНЮ -->
<aside class="w-64 h-screen bg-[#1E3A8A] text-white fixed p-8 flex flex-col shadow-2xl z-50">
    <div class="mb-12 text-center md:text-left">
        <h1 class="text-3xl font-extrabold leading-tight">Logistics <br/><span class="text-[#D4652F]">Admin</span></h1>
    </div>
    <nav class="space-y-3 flex-1">
        <a href="/admin/dashboard" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium"> Обзор системы</a>
        <a href="/admin/companies" class="block py-3 px-5 bg-[#D4652F] rounded-2xl text-sm font-bold text-white shadow-lg"> Реестр компаний</a>
        <a href="/admin/categories" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium"> Классификатор</a>
    </nav>
    <div class="pt-8 border-t border-blue-800/50">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-left py-3 px-5 text-red-300 text-xs font-black uppercase tracking-widest hover:text-white transition">Выйти из системы</button>
        </form>
    </div>
</aside>

<main class="ml-64 p-12 w-full max-w-7xl mx-auto">
    <header class="mb-12 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black text-stone-900 tracking-tight">Реестр компаний</h2>
            <p class="text-stone-400 mt-2 font-medium">Модерация организаций и управление данными</p>
        </div>

        <!-- Toast уведомление -->
        <div th:if="${message}" class="px-6 py-3 bg-green-50 text-green-700 border border-green-200 rounded-2xl text-sm font-bold animate-bounce" th:text="${message}"></div>
    </header>

    <div class="bg-white rounded-[3rem] border border-stone-100 shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-stone-50 border-b border-stone-100">
            <tr>
                <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Компания</th>
                <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Тип</th>
                <th class="px-8 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">Владелец</th>
                <th class="px-8 py-6 text-right text-[10px] font-black uppercase tracking-widest text-stone-400">Действия</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-stone-50">
            <tr th:each="comp : ${companies}" class="hover:bg-[#FFFDFD] transition-colors group">
                <td class="px-8 py-6">
                    <div class="flex items-center space-x-4">
                        <img th:if="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}" th:src="${comp.logoUrl}" class="w-10 h-10 rounded-xl object-cover shadow-sm">
                        <div th:unless="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}"
                             class="w-10 h-10 rounded-xl bg-stone-100 text-stone-600 flex items-center justify-center font-black uppercase" th:text="${comp.name.substring(0,1)}"></div>
                        <div class="flex flex-col min-w-0">
                            <span class="font-bold text-stone-900 text-lg group-hover:text-[#D4652F] transition truncate" th:text="${comp.name}"></span>
                            <span class="text-[10px] text-stone-400 font-bold uppercase tracking-widest">ID: [[${comp.id}]]</span>
                        </div>
                    </div>
                </td>

                <td class="px-8 py-6 text-xs font-bold uppercase tracking-widest" th:classappend="${comp.type.name() == 'SUPPLIER' ? 'text-[#1E3A8A]' : 'text-[#D4652F]'}" th:text="${comp.type}"></td>

                <td class="px-8 py-6 text-sm text-stone-500" th:text="${comp.owner != null ? comp.owner.email : 'Системная'}"></td>

                <td class="px-8 py-6 text-right space-x-2">
                    <!-- Кнопка редактирования (Админская) -->
                    <button type="button"
                            th:onclick="openEditModal([[${comp.id}]], [[${comp.name}]], [[${comp.contactEmail}]], [[${comp.address}]], [[${comp.logoUrl}]], [[${comp.description}]])"
                            class="inline-block p-2 text-stone-400 hover:text-[#1E3A8A] transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                        </svg>
                    </button>

                    <!-- Удаление с таймером -->
                    <form th:action="@{/admin/companies/delete/{id}(id=${comp.id})}" method="post" th:id="'deleteForm-' + ${comp.id}" class="inline-block relative">
                        <button type="button" th:id="'btnInit-' + ${comp.id}" th:onclick="'startTimer(' + ${comp.id} + ')'"
                                class="p-2 text-red-300 hover:text-red-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>

                        <div th:id="'btnTimer-' + ${comp.id}" class="hidden relative overflow-hidden h-8 bg-red-500 text-white px-3 rounded-lg cursor-pointer min-w-[100px]" th:onclick="'stopTimer(' + ${comp.id} + ')'">
                            <div th:id="'progressLine-' + ${comp.id}" class="absolute top-0 left-0 h-full bg-red-700 z-0"></div>
                            <span class="relative z-10 h-full flex items-center justify-center text-[8px] font-black uppercase">Отмена [[${5}]]</span>
                        </div>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- МОДАЛКА РЕДАКТИРОВАНИЯ ДЛЯ АДМИНА -->
<div id="admin-edit-modal" class="hidden fixed inset-0 bg-[#1E3A8A]/40 backdrop-blur-md z-[300] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-xl p-10 rounded-[3rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-2xl font-black text-stone-900 mb-6">Модерация компании</h2>
        <form id="edit-form" method="post" class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-stone-400 ml-2">Название</label>
                <input type="text" name="name" id="modal-name" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-stone-400 ml-2">Email</label>
                <input type="email" name="contactEmail" id="modal-email" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-stone-400 ml-2">Адрес</label>
                <input type="text" name="address" id="modal-address" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-stone-400 ml-2">Логотип (URL)</label>
                <input type="text" name="logoUrl" id="modal-logo" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black uppercase text-stone-400 ml-2">Описание</label>
                <textarea name="description" id="modal-desc" rows="3" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none"></textarea>
            </div>

            <div class="pt-6 flex space-x-3">
                <button type="button" onclick="closeEditModal()" class="flex-1 py-4 text-stone-400 font-bold uppercase text-[10px]">Закрыть</button>
                <button type="submit" class="flex-1 py-4 bg-stone-900 text-white rounded-2xl font-black uppercase text-[10px] hover:bg-black transition shadow-xl shadow-stone-200">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openEditModal(id, name, email, address, logo, desc) {
        const modal = document.getElementById('admin-edit-modal');
        const form = document.getElementById('edit-form');

        document.getElementById('modal-name').value = name || '';
        document.getElementById('modal-email').value = email || '';
        document.getElementById('modal-address').value = address || '';
        document.getElementById('modal-logo').value = logo || '';
        document.getElementById('modal-desc').value = desc || '';

        form.action = '/admin/companies/update/' + id;
        modal.classList.remove('hidden');
    }

    function closeEditModal() {
        document.getElementById('admin-edit-modal').classList.add('hidden');
    }

    const timers = {};
    const intervals = {};
    function startTimer(id) {
        const btnInit = document.getElementById('btnInit-' + id);
        const btnTimer = document.getElementById('btnTimer-' + id);
        const progressLine = document.getElementById('progressLine-' + id);
        btnInit.classList.add('hidden'); btnTimer.classList.remove('hidden'); btnTimer.classList.add('flex');
        progressLine.classList.add('progress-bar');
        timers[id] = setTimeout(() => { document.getElementById('deleteForm-' + id).submit(); }, 5000);
    }
    function stopTimer(id) {
        clearTimeout(timers[id]);
        document.getElementById('btnInit-' + id).classList.remove('hidden');
        document.getElementById('btnTimer-' + id).classList.add('hidden');
    }
</script>

</body>
</html>
