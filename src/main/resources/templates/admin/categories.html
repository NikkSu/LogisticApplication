<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Классификатор | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }

        /* Анимация шкалы таймера */
        @keyframes fillProgress { 0% { width: 100%; } 100% { width: 0%; } }
        .progress-bar { animation: fillProgress 5s linear forwards; }

        .input-focus:focus { border-color: #D4652F; box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1); }
    </style>
</head>
<body class="flex">

<!-- БОКОВОЕ МЕНЮ -->
<aside class="w-64 h-screen bg-[#1E3A8A] text-white fixed p-8 flex flex-col shadow-2xl z-50">
    <div class="mb-12">
        <h1 class="text-3xl font-extrabold leading-tight">Logistics <br/><span class="text-[#D4652F]">Admin</span></h1>
    </div>
    <nav class="space-y-3 flex-1">
        <a href="/admin/dashboard" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium">📊 Обзор системы</a>
        <a href="/admin/companies" class="block py-3 px-5 hover:bg-white/10 rounded-2xl text-sm text-blue-100 transition font-medium">🏢 Реестр компаний</a>
        <a href="/admin/categories" class="block py-3 px-5 bg-[#D4652F] rounded-2xl text-sm font-bold text-white shadow-lg shadow-[#D4652F]/30 transition-transform hover:scale-105">🏷️ Классификатор</a>
    </nav>
    <div class="pt-8 border-t border-blue-800/50">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="w-full text-left py-3 px-5 text-red-300 text-xs font-black uppercase tracking-widest hover:text-white hover:bg-red-500/20 rounded-xl transition">
                Выйти из системы
            </button>
        </form>
    </div>
</aside>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<main class="ml-64 p-12 w-full max-w-7xl mx-auto">
    <header class="mb-12">
        <h2 class="text-4xl font-black text-stone-900 tracking-tight">Классификатор товаров</h2>
        <p class="text-stone-400 mt-2 font-medium">Управление глобальным деревом категорий для поставщиков</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">

        <!-- ФОРМА (Слева) -->
        <div class="lg:col-span-4 bg-white p-8 rounded-[3rem] border border-stone-100 shadow-sm sticky top-10">
            <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-[#D4652F] mb-6 border border-orange-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <h3 class="font-black text-stone-800 mb-2 text-xl">Новая категория</h3>
            <p class="text-[10px] uppercase font-bold tracking-widest text-stone-400 mb-8">Добавление в систему</p>

            <form th:action="@{/admin/categories/save}" method="post" class="space-y-4">
                <input type="text" name="name" placeholder="Напр: Оргтехника" required
                       class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-2 border-transparent outline-none input-focus transition-all font-medium text-stone-800">
                <button type="submit" class="w-full py-4 bg-[#1E3A8A] text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-[#152c6e] transition shadow-lg shadow-blue-900/20">
                    Сохранить
                </button>
            </form>
        </div>

        <!-- ТАБЛИЦА (Справа) -->
        <div class="lg:col-span-8 bg-white rounded-[3rem] border border-stone-100 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-stone-50 border-b border-stone-100">
                <tr>
                    <th class="px-10 py-6 text-[10px] font-black uppercase tracking-widest text-stone-400">ID / Наименование</th>
                    <th class="px-10 py-6 text-right text-[10px] font-black uppercase tracking-widest text-stone-400">Управление</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-stone-50">
                <tr th:each="cat : ${categories}" class="hover:bg-[#FFF9F8] transition-colors duration-300 group">
                    <td class="px-10 py-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-xl bg-stone-50 flex items-center justify-center text-stone-400 font-bold border border-stone-100 group-hover:border-[#D4652F] transition-colors">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">ID: [[${cat.id}]]</span>
                                <span class="font-bold text-stone-900 text-lg group-hover:text-[#D4652F] transition-colors" th:text="${cat.name}"></span>
                            </div>
                        </div>
                    </td>
                    <td class="px-10 py-6 text-right">
                        <!-- ФОРМА УДАЛЕНИЯ С ТАЙМЕРОМ -->
                        <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post" th:id="'deleteForm-' + ${cat.id}" class="inline-block relative">

                            <!-- Исходная кнопка -->
                            <button type="button" th:id="'btnInit-' + ${cat.id}" th:onclick="'startTimer(' + ${cat.id} + ')'"
                                    class="text-red-400 hover:text-white border border-red-200 hover:bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                                Удалить
                            </button>

                            <!-- Кнопка таймера (скрыта) -->
                            <div th:id="'btnTimer-' + ${cat.id}"
                                 class="hidden relative overflow-hidden h-9 bg-red-600 text-white px-4 rounded-xl cursor-pointer group shadow-lg min-w-[120px]"
                                 th:onclick="'stopTimer(' + ${cat.id} + ')'">
                                <div th:id="'progressLine-' + ${cat.id}" class="absolute top-0 left-0 h-full bg-red-800 z-0"></div>
                                <span class="relative z-10 h-full flex items-center justify-center group-hover:hidden text-[9px] font-black uppercase tracking-widest">
                                        Отмена <span th:id="'timerText-' + ${cat.id}" class="ml-1 text-xs">5</span>
                                    </span>
                                <span class="relative z-10 h-full items-center justify-center hidden group-hover:flex text-[9px] font-black uppercase tracking-widest">
                                        Прервать
                                    </span>
                            </div>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${categories.isEmpty()}" class="py-24 text-center">
                <p class="text-stone-400 font-medium font-italic">Список категорий пуст</p>
            </div>
        </div>
    </div>
</main>

<script>
    const timers = {};
    const intervals = {};

    function startTimer(id) {
        const btnInit = document.getElementById('btnInit-' + id);
        const btnTimer = document.getElementById('btnTimer-' + id);
        const timerText = document.getElementById('timerText-' + id);
        const progressLine = document.getElementById('progressLine-' + id);
        const form = document.getElementById('deleteForm-' + id);

        let timeLeft = 5;

        btnInit.classList.add('hidden');
        btnTimer.classList.remove('hidden');
        btnTimer.classList.add('flex');

        progressLine.classList.add('progress-bar');

        intervals[id] = setInterval(() => {
            timeLeft -= 1;
            timerText.innerText = timeLeft;
        }, 1000);

        timers[id] = setTimeout(() => {
            clearInterval(intervals[id]);
            form.submit();
        }, 5000);
    }

    function stopTimer(id) {
        const btnInit = document.getElementById('btnInit-' + id);
        const btnTimer = document.getElementById('btnTimer-' + id);
        const timerText = document.getElementById('timerText-' + id);
        const progressLine = document.getElementById('progressLine-' + id);

        clearTimeout(timers[id]);
        clearInterval(intervals[id]);

        progressLine.classList.remove('progress-bar');
        timerText.innerText = '5';

        btnTimer.classList.add('hidden');
        btnTimer.classList.remove('flex');
        btnInit.classList.remove('hidden');
    }
</script>

</body>
</html>
