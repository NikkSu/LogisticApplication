<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация компании | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .form-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-submit { background-color: #8B4513; color: white; transition: 0.3s; }
        .btn-submit:hover { background-color: #5D2E0B; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="form-card p-10 w-full max-w-lg">
    <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold text-stone-800">Новая компания</h2>
        <p class="text-stone-500 mt-2">Зарегистрируйте свой бизнес в системе</p>
    </div>

    <form th:action="@{/companies/create}" th:object="${company}" method="post" class="space-y-6">
        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Название компании</label>
            <input type="text" th:field="*{name}" required
                   class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700"
                   placeholder="Например: ООО Вектра">
        </div>

        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Тип деятельности</label>
            <select th:field="*{type}" class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700">
                <option th:value="SUPPLIER">Поставщик (продажа товаров)</option>
                <option th:value="CUSTOMER">Заказчик (закупка товаров)</option>
            </select>
        </div>
        <!-- Добавь это в форму внутри company-create.html -->
        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Email компании для связи</label>
            <input type="email" th:field="*{contactEmail}" required
                   class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700"
                   placeholder="office@company.com">
        </div>

        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Юридический адрес (для карты)</label>
            <input type="text" th:field="*{address}" required
                   class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700"
                   placeholder="Москва, ул. Ленина, д. 1">
        </div>

        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">О компании</label>
            <textarea th:field="*{description}" rows="4"
                      class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700"
                      placeholder="Расскажите о вашей деятельности..."></textarea>
        </div>
        <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Ссылка на логотип (URL)</label>
            <input type="text" th:field="*{logoUrl}"
                   class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:outline-none focus:border-amber-700"
                   placeholder="https://example.com/logo.png">
        </div>

        <button type="submit" class="btn-submit w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-amber-900/20 mt-4">
            Создать компанию
        </button>

        <a href="/companies" class="block text-center text-sm text-stone-400 hover:text-stone-600">Отмена</a>
    </form>
</div>

</body>
</html>
