<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        .order-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .order-card:hover { transform: translateX(4px); border-color: #1E3A8A; box-shadow: 0 10px 25px -5px rgba(30, 58, 138, 0.05); }
    </style>
</head>
<body class="py-12">
<div class="max-w-5xl mx-auto px-4 lg:px-8">

    <!-- Навигация -->
    <nav class="mb-12">
        <a href="/dashboard" class="group flex items-center text-stone-400 hover:text-[#1E3A8A] transition font-bold text-sm w-fit">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Вернуться на главную
        </a>
    </nav>

    <!-- Заголовок и бейдж -->
    <div class="flex items-end justify-between mb-12">
        <div>
            <h1 class="text-4xl font-black text-stone-900 tracking-tight" th:text="${pageTitle}"></h1>
            <p class="text-stone-400 mt-2 font-medium">Мониторинг всех сделок вашей компании</p>
        </div>
        <div class="hidden md:block px-5 py-2 bg-white border border-stone-200 rounded-full shadow-sm">
            <span class="text-[10px] font-black uppercase tracking-widest text-stone-500">
                Всего записей: [[${orders.size()}]]
            </span>
        </div>
    </div>

    <!-- ЛЕНТА ЗАКАЗОВ -->
    <div class="space-y-4">

        <!-- КАРТОЧКА ЗАКАЗА -->
        <div th:each="order : ${orders}" class="order-card bg-white p-6 md:p-8 rounded-[2rem] border border-stone-100 shadow-sm flex flex-col md:flex-row md:items-center justify-between gap-6 group">

            <div class="flex items-center space-x-6">
                <!-- Иконка статуса -->
                <div th:class="${order.status.name() == 'DELIVERED' ? 'bg-green-50 text-green-600' : (order.status.name() == 'CANCELLED' ? 'bg-red-50 text-red-600' : 'bg-blue-50 text-blue-600')} + ' w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner'">
                    <!-- Иконка "Готово" -->
                    <svg th:if="${order.status.name() == 'DELIVERED'}" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <!-- Иконка "В процессе" -->
                    <svg th:if="${order.status.name() == 'CREATED' || order.status.name() == 'CONFIRMED' || order.status.name() == 'SHIPPED'}" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <!-- Иконка "Отмена" -->
                    <svg th:if="${order.status.name() == 'CANCELLED'}" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </div>

                <div>
                    <!-- Номер и Статус -->
                    <div class="flex items-center flex-wrap gap-3 mb-2">
                        <span class="text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]" th:text="'ID: ' + ${order.id}"></span>

                        <span th:class="${order.status.name() == 'DELIVERED' ? 'bg-green-100 text-green-700 border-green-200' : (order.status.name() == 'CANCELLED' ? 'bg-red-100 text-red-700 border-red-200' : 'bg-[#1E3A8A]/10 text-[#1E3A8A] border-[#1E3A8A]/20')} + ' px-2.5 py-1 rounded-md text-[9px] font-black uppercase tracking-widest border shadow-sm'"
                              th:text="${order.status}"></span>
                    </div>

                    <!-- Контрагент -->
                    <h3 class="text-xl font-bold text-stone-800 leading-tight">
                        <span th:if="${currentUser.company.type.name() == 'SUPPLIER'}" class="text-stone-400 font-medium text-sm mr-1">Для:</span>
                        <span th:if="${currentUser.company.type.name() == 'SUPPLIER'}" th:text="${order.customerCompany.name}"></span>

                        <span th:if="${currentUser.company.type.name() == 'CUSTOMER'}" class="text-stone-400 font-medium text-sm mr-1">От:</span>
                        <span th:if="${currentUser.company.type.name() == 'CUSTOMER'}" th:text="${order.supplierCompany.name}"></span>
                    </h3>

                    <!-- Дата -->
                    <p class="text-xs text-stone-500 font-medium mt-1 flex items-center">
                        <svg class="w-3 h-3 mr-1 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy')}"></span>
                        <span class="mx-2 text-stone-300">•</span>
                        <span th:text="${#temporals.format(order.createdAt, 'HH:mm')}"></span>
                    </p>
                </div>
            </div>

            <!-- Сумма и кнопка -->
            <div class="flex md:flex-col items-center md:items-end justify-between border-t md:border-t-0 border-stone-50 pt-4 md:pt-0 w-full md:w-auto">
                <div class="mb-0 md:mb-3">
                    <p class="text-[10px] text-stone-400 font-black uppercase tracking-widest text-left md:text-right mb-1">Сумма контракта</p>
                    <p class="text-2xl font-black text-[#D4652F] leading-none" th:text="${order.totalPrice != null ? order.totalPrice : '0'} + ' Б'"></p>
                </div>

                <a th:href="@{/orders/view/{id}(id=${order.id})}"
                   class="inline-block px-8 py-3 bg-stone-50 text-stone-600 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-[#1E3A8A] hover:text-white transition shadow-sm border border-stone-100 group-hover:border-[#1E3A8A]/30">
                    Детали сделки
                </a>
            </div>
        </div>

        <!-- Если список пуст -->
        <div th:if="${orders.isEmpty()}" class="text-center py-32 bg-white rounded-[3rem] border border-stone-100 shadow-sm mt-8">
            <div class="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">📭</div>
            <p class="text-stone-800 text-xl font-bold mb-2">Список сделок пуст</p>
            <p class="text-stone-400 text-sm font-medium">Здесь будет отображаться история ваших заказов</p>
        </div>
    </div>
</div>
</body>
</html>
