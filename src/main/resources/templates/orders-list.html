<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои заказы | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="py-10">
<div class="max-w-5xl mx-auto px-4">
    <nav class="mb-8"><a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm">← На главную</a></nav>

    <h1 class="text-4xl font-black text-stone-900 mb-10">История заказов</h1>

    <div class="space-y-6">
        <div th:each="order : ${orders}" class="bg-white p-8 rounded-3xl border border-stone-100 shadow-sm flex items-center justify-between hover:border-amber-200 transition">
            <div>
                <div class="flex items-center space-x-4 mb-2">
                    <span class="text-xs font-black text-stone-400 uppercase tracking-widest" th:text="'Заказ #' + ${order.id}"></span>
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase bg-amber-50 text-amber-700" th:text="${order.status}"></span>
                </div>
                <h3 class="text-lg font-bold text-stone-800" th:text="'Поставщик: ' + ${order.supplierCompany.name}"></h3>
                <p class="text-sm text-stone-400" th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy, HH:mm')}"></p>
            </div>

            <div class="text-right">
                <a th:href="@{/orders/view/{id}(id=${order.id})}" class="inline-block px-6 py-2 border border-stone-200 rounded-xl text-sm font-bold text-stone-600 hover:bg-stone-50 transition">
                    Подробнее
                </a>
            </div>
        </div>

        <div th:if="${orders.isEmpty()}" class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-stone-100">
            <p class="text-stone-400 italic">Вы еще не совершили ни одного заказа</p>
        </div>
    </div>
</div>
</body>
</html>
