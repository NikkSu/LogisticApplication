<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="py-10">
<div class="max-w-5xl mx-auto px-4">
    <nav class="mb-8 flex justify-between items-center">
        <a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Назад на главную
        </a>
    </nav>

    <!-- Используем переменную pageTitle из контроллера -->
    <h1 class="text-4xl font-black text-stone-900 mb-10" th:text="${pageTitle}">История заказов</h1>

    <div class="space-y-6">
        <div th:each="order : ${orders}" class="bg-white p-8 rounded-3xl border border-stone-100 shadow-sm flex items-center justify-between hover:border-amber-200 transition">
            <div>
                <div class="flex items-center space-x-4 mb-2">
                    <span class="text-xs font-black text-stone-400 uppercase tracking-widest" th:text="'Заказ №' + ${order.id}"></span>

                    <!-- Статус с разным цветом -->
                    <span th:class="${order.status.name() == 'DELIVERED' ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'} + ' px-3 py-1 rounded-full text-[10px] font-bold uppercase'"
                          th:text="${order.status}"></span>
                </div>

                <!-- Умное отображение партнера -->
                <h3 class="text-lg font-bold text-stone-800">
                    <!-- Если я Поставщик - показываю кто у меня купил -->
                    <span th:if="${currentUser.company.type.name() == 'SUPPLIER'}" th:text="'Заказчик: ' + ${order.customerCompany.name}"></span>
                    <!-- Если я Заказчик - показываю у кого я купил -->
                    <span th:if="${currentUser.company.type.name() == 'CUSTOMER'}" th:text="'Поставщик: ' + ${order.supplierCompany.name}"></span>
                </h3>

                <p class="text-sm text-stone-400" th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy, HH:mm')}"></p>
            </div>

            <div class="text-right">
                <div class="mb-2">
                    <span class="text-xl font-black text-stone-900" th:text="${order.totalPrice != null ? order.totalPrice : '0'} + ' Б'"></span>
                </div>
                <a th:href="@{/orders/view/{id}(id=${order.id})}" class="inline-block px-6 py-2 border border-stone-200 rounded-xl text-sm font-bold text-stone-600 hover:bg-stone-50 transition">
                    Подробнее
                </a>
            </div>
        </div>

        <!-- Если заказов нет -->
        <div th:if="${orders.isEmpty()}" class="text-center py-24 bg-white rounded-[3rem] border-2 border-dashed border-stone-100">
            <p class="text-stone-400 italic">Список заказов пока пуст</p>
        </div>
    </div>
</div>
</body>
</html>
