<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .blob { position: absolute; z-index: -1; filter: blur(80px); opacity: 0.4; border-radius: 50%; }
        /* ТОЧНО ТАКАЯ ЖЕ ФИКСИРОВАННАЯ ВЫСОТА КАК В ЛОГИНЕ */
        @media (min-width: 768px) { .auth-container { height: 750px; } }
        .input-focus:focus { border-color: #D4652F; box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1); }
        .btn-primary { background-color: #D4652F; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { background-color: #b54d24; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(212, 101, 47, 0.4); }
        .error-label { color: #dc2626; font-size: 0.7rem; font-weight: 700; margin-top: 2px; margin-left: 0.5rem; text-transform: uppercase; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">
<div class="blob w-96 h-96 bg-[#D4652F] -bottom-20 -left-20"></div>
<div class="blob w-80 h-80 bg-[#1E3A8A] -top-20 -right-20"></div>

<div class="auth-container w-full max-w-5xl flex flex-col md:flex-row m-4 bg-white rounded-[3rem] shadow-2xl shadow-stone-200/50 overflow-hidden">

    <!-- Левая часть -->
    <div class="hidden md:flex flex-col justify-center p-16 bg-[#1E3A8A] text-white w-1/2 relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-5xl font-extrabold mb-6 leading-tight">Join the <br/><span class="text-[#D4652F]">Hub</span></h1>
            <p class="text-blue-100 text-lg leading-relaxed opacity-80">Станьте частью цифровой экосистемы для эффективного управления</p>
        </div>
        <div class="absolute top-0 right-0 w-full h-full opacity-10 pointer-events-none scale-150">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><path fill="#FFFFFF" d="M40.2,-68.1C51.1,-61.4,58.3,-48.1,64.2,-34.5C70.1,-20.9,74.7,-7.1,72.4,5.8C70.1,18.7,60.8,30.6,50.7,41.2C40.6,51.8,29.7,61.1,16.5,65.8C3.3,70.5,-12.3,70.5,-26.8,65.8C-41.3,61.1,-54.7,51.8,-63.1,39.4C-71.5,27.1,-74.9,11.8,-73.4,-2.7C-71.9,-17.2,-65.4,-30.9,-55.8,-42.6C-46.1,-54.3,-33.4,-64,-19.7,-68.8C-6,-73.6,8.7,-73.5,23.3,-71.4C37.9,-69.3,52.4,-65.2,40.2,-68.1Z" transform="translate(100 100)" /></svg>
        </div>
    </div>

    <!-- Правая часть -->
    <div class="p-10 md:px-16 w-full md:w-1/2 flex flex-col justify-center">
        <div class="mb-8 text-center md:text-left">
            <h2 class="text-3xl font-black text-stone-900 mb-2">Создать аккаунт</h2>
            <p class="text-stone-400 text-sm font-medium">Заполните данные для начала работы</p>
        </div>

        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded-xl mb-6 text-sm">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register-submit}" th:object="${registerRequest}" method="post" class="space-y-4 flex-grow-0">
            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em] ml-2">Email адрес*</label>
                <input type="email" th:field="*{email}" required placeholder="example@mail.com"
                       class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800" />
                <p class="error-label" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>
            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em] ml-2">Пароль*</label>
                <input type="password" th:field="*{password}" required placeholder="••••••••"
                       class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800" />
                <p class="error-label" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between items-center px-2">
                    <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em]">ID Компании</label>
                    <span class="text-[9px] font-bold text-stone-300 uppercase">Опционально</span>
                </div>
                <input type="number" th:field="*{companyId}" placeholder="12345"
                       class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800" />
                <p class="error-label" th:if="${#fields.hasErrors('companyId')}" th:errors="*{companyId}"></p>
            </div>

            <button type="submit" class="btn-primary w-full py-5 rounded-2xl text-white font-extrabold text-sm uppercase tracking-widest mt-6 mb-4">
                Зарегистрироваться
            </button>
        </form>

        <div class="text-center mt-auto">
            <p class="text-stone-400 text-sm font-medium">Уже в системе?
                <a href="/login" class="text-[#D4652F] font-black hover:underline ml-1">Войти</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
