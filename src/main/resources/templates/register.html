<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F5F5DC; font-family: 'Segoe UI', sans-serif; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #8B4513; color: white; transition: 0.3s; }
        .btn-primary:hover { background-color: #5D2E0B; }
        .input-field { border: 1px solid #D2B48C; border-radius: 8px; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #8B4513; ring: 2px #8B4513; }
        .error-text { color: #b91c1c; font-size: 0.85rem; margin-top: 4px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="form-card p-8 w-full max-w-md">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-stone-800">Создать аккаунт</h2>
        <p class="text-stone-500">Система управления закупками</p>
    </div>

    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register-submit}" th:object="${registerRequest}" method="post" class="space-y-4">
        <div>
            <label class="block text-stone-700 font-medium mb-1">Email</label>
            <input type="email" th:field="*{email}"
                   class="input-field w-full px-4 py-2" placeholder="example@mail.com"/>
            <p class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div>
            <label class="block text-stone-700 font-medium mb-1">Пароль</label>
            <input type="password" th:field="*{password}"
                   class="input-field w-full px-4 py-2" placeholder="••••••••"/>
            <p class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <div>
            <label class="block text-stone-700 font-medium mb-1">ID Компании (опционально)</label>
            <input type="number" th:field="*{companyId}"
                   class="input-field w-full px-4 py-2" placeholder="123"/>
            <p class="error-text" th:if="${#fields.hasErrors('companyId')}" th:errors="*{companyId}"></p>
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold mt-4">
            Зарегистрироваться
        </button>
    </form>

    <div class="mt-6 text-center text-sm">
        <span class="text-stone-600">Уже есть аккаунт?</span>
        <a href="/login" class="text-amber-800 font-bold hover:underline ml-1">Войти</a>
    </div>
</div>

</body>
</html>
