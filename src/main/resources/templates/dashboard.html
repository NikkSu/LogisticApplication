<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .card { transition: all 0.3s ease; border: 1px solid #e5e7eb; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(139, 69, 19, 0.1); border-color: #D2B48C; }
        .btn-buy { background-color: #8B4513; transition: 0.3s; }
        .btn-buy:hover { background-color: #5D2E0B; }
        .category-active { color: #8B4513; font-weight: bold; border-left: 3px solid #8B4513; padding-left: 8px; }
    </style>
</head>
<body>

<nav class="bg-white shadow-sm border-b border-stone-200 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-8">
        <a href="/dashboard"><h1 class="text-2xl font-bold text-stone-800">Logistics<span class="text-amber-700">Hub</span></h1></a>

        <a href="/companies" class="text-stone-600 hover:text-amber-800 font-medium text-sm">Компании</a>

        <form th:action="@{/dashboard}" method="get" class="relative">
            <input type="hidden" name="category" th:value="${selectedCategory}">
            <input type="text" name="search" th:value="${searchQuery}" placeholder="Поиск товаров..." class="w-96 pl-10 pr-4 py-2 border border-stone-300 rounded-full focus:outline-none focus:border-amber-700">
            <svg class="w-5 h-5 text-stone-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </form>
    </div>

    <div class="flex items-center space-x-6 text-stone-600">
        <div class="text-right">
            <p class="text-xs text-stone-400">Добро пожаловать,</p>
            <p class="font-semibold text-sm" th:text="${userEmail}">user@mail.com</p>
        </div>
        <a href="/companies/my" class="p-2 hover:bg-stone-100 rounded-full transition" title="Моя компания">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
        </a>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-8 py-8 flex space-x-8">
    <aside class="w-64 flex-shrink-0">
        <h3 class="font-bold text-stone-800 mb-4 uppercase text-xs tracking-wider">Категории</h3>
        <ul class="space-y-2">
            <li><a th:href="@{/dashboard}" th:class="${selectedCategory == null} ? 'category-active block py-1' : 'text-stone-600 hover:text-amber-800 text-sm block py-1'">Все товары</a></li>
            <li th:each="cat : ${categories}"><a th:href="@{/dashboard(category=${cat.id}, search=${searchQuery})}" th:text="${cat.name}" th:class="${selectedCategory == cat.id} ? 'category-active block py-1' : 'text-stone-600 hover:text-amber-800 text-sm block py-1'">Категория</a></li>
        </ul>
    </aside>

    <main class="flex-1">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-stone-800">Каталог товаров</h2>
            <span class="text-sm text-stone-500" th:text="${products.size() + ' товаров на странице'}"></span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div th:each="product : ${products}" class="card bg-white rounded-xl overflow-hidden shadow-sm">
                <a th:href="@{/product/{id}(id=${product.id})}">
                    <div class="h-48 bg-stone-100 relative cursor-pointer">
                        <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x200?text=No+Image'}" class="w-full h-full object-cover">

                        <div class="absolute top-2 left-2 flex items-center bg-white/90 backdrop-blur pr-2 rounded shadow-sm overflow-hidden">
                            <div th:if="${product.supplier.logoUrl == null || product.supplier.logoUrl.isEmpty()}"
                                 class="w-6 h-6 bg-amber-700 text-white text-[10px] flex items-center justify-center font-bold"
                                 th:text="${product.supplier.name.substring(0,1)}"></div>
                            <img th:if="${product.supplier.logoUrl != null && !product.supplier.logoUrl.isEmpty()}"
                                 th:src="${product.supplier.logoUrl}" class="w-6 h-6 object-cover">
                            <span class="text-[10px] font-bold text-stone-600 ml-1.5" th:text="${product.supplier.name}"></span>
                        </div>
                    </div>
                </a>

                <div class="p-4">
                    <a th:href="@{/product/{id}(id=${product.id})}" class="group">
                        <h4 class="font-semibold text-stone-800 mb-1 truncate group-hover:text-amber-700 transition" th:text="${product.name}"></h4>
                    </a>
                    <p class="text-xs text-stone-400 mb-3" th:text="${product.category != null ? product.category.name : 'Без категории'}"></p>
                    <div class="flex items-center justify-between mt-4">
                        <span class="text-lg font-bold text-stone-900" th:text="${#numbers.formatDecimal(product.price, 1, 2) + ' ₽'}"></span>
                        <button class="btn-buy text-white p-2 rounded-lg shadow-md">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${products.isEmpty()}" class="text-center py-20">
            <p class="text-stone-400 text-lg font-medium">По вашему запросу ничего не найдено :(</p>
            <a href="/dashboard" class="text-amber-700 underline mt-2 block">Сбросить все фильтры</a>
        </div>

        <div th:if="${totalPages > 1}" class="mt-12 flex justify-center items-center space-x-4">

            <a th:if="${currentPage > 0}"
               th:href="@{/dashboard(page=${currentPage - 1}, search=${searchQuery}, category=${selectedCategory})}"
               class="px-4 py-2 bg-white border border-stone-300 rounded-lg text-stone-600 hover:bg-stone-50 transition">
                Назад
            </a>

            <div class="text-stone-500 font-medium">
                Страница <span th:text="${currentPage + 1}" class="text-stone-800"></span> из <span th:text="${totalPages}"></span>
            </div>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/dashboard(page=${currentPage + 1}, search=${searchQuery}, category=${selectedCategory})}"
               class="px-4 py-2 bg-white border border-stone-300 rounded-lg text-stone-600 hover:bg-stone-50 transition">
                Вперед
            </a>

        </div>
    </main>
</div>

</body>
</html>
