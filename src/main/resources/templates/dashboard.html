<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(212, 101, 47, 0.1); border-color: #D4652F; }
        .btn-buy { background-color: #1E3A8A; transition: all 0.3s ease; }
        .btn-buy:hover { background-color: #152c6e; transform: scale(1.05); }
        .category-active { color: #D4652F; font-weight: 900; background-color: rgba(212, 101, 47, 0.05); padding-left: 12px; border-left: 4px solid #D4652F; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body class="pb-20">

<!-- НАВИГАЦИЯ -->
<nav class="bg-white/90 backdrop-blur-md shadow-sm border-b border-stone-100 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center space-x-8 flex-1">
        <!-- Бренд -->
        <a href="/dashboard" class="flex-shrink-0">
            <h1 class="text-2xl font-black text-[#1E3A8A] tracking-tight">Logistics<span class="text-[#D4652F]">Hub</span></h1>
        </a>

        <!-- Меню ссылок -->
        <div class="flex items-center space-x-2 flex-shrink-0">
            <a href="/companies" class="px-4 py-2 text-stone-500 hover:text-[#1E3A8A] hover:bg-stone-50 rounded-xl font-bold text-sm transition">Компании</a>

            <a th:if="${currentUser.company != null && currentUser.company.type.name() == 'SUPPLIER'}"
               href="/my-products"
               class="px-4 py-2 text-[#D4652F] bg-orange-50 hover:bg-orange-100 rounded-xl font-bold text-sm transition uppercase tracking-widest text-[10px]">
                📦 Мои товары
            </a>

            <a th:if="${currentUser.company != null && (isOwner || currentUser.role.name() == 'ANALYST')}"
               href="/analytics"
               class="px-4 py-2 text-stone-500 hover:text-[#1E3A8A] hover:bg-stone-50 rounded-xl font-bold text-sm flex items-center transition">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Аналитика
            </a>
        </div>

        <!-- Поиск -->
        <form th:action="@{/dashboard}" method="get" class="relative flex-1 max-w-lg mx-4">
            <input type="hidden" name="category" th:value="${selectedCategory}">
            <input type="text" name="search" th:value="${searchQuery}" placeholder="Поиск товаров в каталоге..."
                   class="w-full pl-12 pr-4 py-3 bg-stone-50 border-2 border-transparent rounded-2xl focus:outline-none focus:border-[#D4652F] focus:bg-white transition text-sm font-medium text-stone-800">
            <svg class="w-5 h-5 text-stone-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </form>

        <!-- Корзина в шапке (для Покупателя) -->
        <a th:if="${currentUser.company != null && currentUser.company.type.name() == 'CUSTOMER' && currentUser.role.name() == 'MANAGER'}"
           href="/cart" class="relative p-3 text-stone-500 hover:text-[#D4652F] hover:bg-orange-50 rounded-xl transition flex-shrink-0">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span th:if="${cartSize > 0}" class="absolute top-1 right-1 bg-[#D4652F] text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white" th:text="${cartSize}"></span>
        </a>
    </div>

    <!-- Блок пользователя -->
    <div class="flex items-center space-x-4 flex-shrink-0 ml-4 pl-4 border-l border-stone-100">
        <div class="flex flex-col items-end">
            <a href="/profile" class="text-sm font-black text-stone-800 hover:text-[#D4652F] transition block" th:text="${userEmail}"></a>
            <div class="mt-1">
                <!-- Если в компании -->
                <a th:if="${currentUser != null && currentUser.company != null}"
                   href="/companies/my"
                   class="inline-flex items-center px-2 py-0.5 rounded-md text-[9px] font-black bg-[#1E3A8A]/10 text-[#1E3A8A] hover:bg-[#1E3A8A]/20 transition uppercase tracking-widest">
                    <span th:text="${currentUser.company.name}"></span>
                </a>
                <!-- Если без компании -->
                <a th:if="${currentUser != null && currentUser.company == null}"
                   href="/companies"
                   class="inline-flex items-center px-2 py-0.5 rounded-md text-[9px] font-black bg-stone-100 text-stone-500 hover:bg-stone-200 transition uppercase tracking-widest">
                    Выбрать компанию
                </a>
            </div>
        </div>

        <a href="/profile" class="w-12 h-12 rounded-[1rem] overflow-hidden border-2 border-transparent hover:border-[#D4652F] shadow-sm transition flex items-center justify-center bg-stone-100 text-stone-500 font-black text-xl">
            <img th:if="${currentUser.avatarUrl != null && !currentUser.avatarUrl.isEmpty()}"
                 th:src="${currentUser.avatarUrl}" class="w-full h-full object-cover">
            <span th:unless="${currentUser.avatarUrl != null && !currentUser.avatarUrl.isEmpty()}"
                  th:text="${userEmail.substring(0,1).toUpperCase()}"></span>
        </a>
    </div>
</nav>

<div class="max-w-[90rem] mx-auto px-4 lg:px-8 py-8 flex flex-col lg:flex-row gap-10 items-start">

    <!-- САЙДБАР: КАТЕГОРИИ -->
    <aside class="w-full lg:w-64 flex-shrink-0 bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm sticky top-28">
        <h3 class="font-black text-stone-800 mb-6 uppercase text-xs tracking-widest px-4">Категории</h3>
        <ul class="space-y-1">
            <li>
                <a th:href="@{/dashboard}"
                   th:class="${selectedCategory == null} ? 'category-active block py-2 px-4 text-sm' : 'text-stone-500 font-medium hover:text-[#D4652F] hover:bg-orange-50/50 rounded-lg text-sm block py-2 px-4 transition'">
                    Все товары
                </a>
            </li>
            <li th:each="cat : ${categories}">
                <a th:href="@{/dashboard(category=${cat.id}, search=${searchQuery})}"
                   th:text="${cat.name}"
                   th:class="${selectedCategory == cat.id} ? 'category-active block py-2 px-4 text-sm' : 'text-stone-500 font-medium hover:text-[#D4652F] hover:bg-orange-50/50 rounded-lg text-sm block py-2 px-4 transition'">
                </a>
            </li>
        </ul>
    </aside>

    <!-- ОСНОВНАЯ ВИТРИНА -->
    <main class="flex-1 w-full min-w-0">
        <div class="flex justify-between items-end mb-8 px-2">
            <h2 class="text-3xl font-black text-stone-900">Витрина товаров</h2>
            <span class="text-xs font-bold uppercase tracking-widest text-stone-400 bg-white px-4 py-1.5 rounded-full border border-stone-100"
                  th:text="${products.size() + ' найдено'}"></span>
        </div>

        <!-- СЕТКА КАРТОЧЕК -->
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">
            <div th:each="product : ${products}" class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-stone-100 flex flex-col">
                <!-- Картинка -->
                <a th:href="@{/product/{id}(id=${product.id})}" class="relative block bg-stone-50 aspect-square overflow-hidden group">
                    <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/400x400?text=No+Image'}"
                         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">

                    <!-- Логотип поставщика -->
                    <div class="absolute top-4 left-4 flex items-center bg-white/95 backdrop-blur px-2 py-1.5 rounded-xl shadow-sm border border-white">
                        <div th:if="${product.supplier.logoUrl == null || product.supplier.logoUrl.isEmpty()}"
                             class="w-6 h-6 rounded-lg bg-stone-100 text-stone-500 text-[10px] flex items-center justify-center font-black"
                             th:text="${product.supplier.name.substring(0,1)}"></div>
                        <img th:if="${product.supplier.logoUrl != null && !product.supplier.logoUrl.isEmpty()}"
                             th:src="${product.supplier.logoUrl}" class="w-6 h-6 rounded-lg object-cover">
                        <span class="text-[10px] font-black text-stone-700 ml-2 uppercase tracking-tighter truncate max-w-[80px]" th:text="${product.supplier.name}"></span>
                    </div>
                </a>

                <!-- Контент карточки -->
                <div class="p-6 flex flex-col flex-1">
                    <a th:href="@{/product/{id}(id=${product.id})}" class="group mb-1">
                        <h4 class="font-bold text-stone-800 text-lg leading-tight group-hover:text-[#D4652F] transition truncate" th:text="${product.name}"></h4>
                    </a>
                    <p class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-6" th:text="${product.category != null ? product.category.name : 'Без категории'}"></p>

                    <!-- Блок Цены и Действий -->
                    <div class="mt-auto flex items-center justify-between pt-4 border-t border-stone-50">
                        <span class="text-2xl font-black text-stone-900" th:text="${#numbers.formatDecimal(product.price, 1, 2) + ' Б'}"></span>

                        <div class="flex items-center space-x-2">
                            <!-- ИЗБРАННОЕ -->
                            <form th:action="@{/favorites/toggle/{id}(id=${product.id})}" method="post">
                                <button type="submit" class="p-2.5 rounded-xl bg-stone-50 hover:bg-red-50 hover:text-red-500 text-stone-400 transition group/fav">
                                    <svg th:if="${favoriteIds.contains(product.id)}" class="w-5 h-5 text-red-500 fill-current hover:scale-110 transition-transform" viewBox="0 0 24 24">
                                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                    </svg>
                                    <svg th:unless="${favoriteIds.contains(product.id)}" class="w-5 h-5 fill-none stroke-current group-hover/fav:text-red-500 hover:scale-110 transition-transform" stroke-width="2" viewBox="0 0 24 24">
                                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                                    </svg>
                                </button>
                            </form>

                            <!-- КОРЗИНА (Только Менеджер) -->
                            <form th:if="${currentUser.company != null && currentUser.company.type.name() == 'CUSTOMER' && currentUser.role.name() == 'MANAGER'}"
                                  th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                <button type="submit" class="btn-buy text-white p-3 rounded-xl shadow-lg shadow-blue-900/20 flex items-center justify-center">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                </button>
                            </form>

                            <!-- ПРОСМОТР (Аналитик / Поставщик) -->
                            <a th:if="${currentUser.company != null && (currentUser.role.name() == 'ANALYST' || currentUser.company.type.name() == 'SUPPLIER')}"
                               th:href="@{/product/{id}(id=${product.id})}"
                               class="p-2.5 rounded-xl bg-stone-50 text-stone-400 hover:bg-[#1E3A8A] hover:text-white transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Если пусто -->
        <div th:if="${products.isEmpty()}" class="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-stone-100 mt-6">
            <div class="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">📦</div>
            <p class="text-stone-400 text-lg font-medium">По вашему запросу ничего не найдено</p>
            <a href="/dashboard" class="text-[#D4652F] font-black uppercase tracking-widest text-[10px] mt-4 inline-block hover:underline">Сбросить все фильтры</a>
        </div>

        <!-- Пагинация -->
        <div th:if="${totalPages > 1}" class="mt-16 flex justify-center items-center space-x-6">
            <a th:if="${currentPage > 0}"
               th:href="@{/dashboard(page=${currentPage - 1}, search=${searchQuery}, category=${selectedCategory})}"
               class="px-6 py-3 bg-white border border-stone-200 rounded-xl text-stone-600 font-bold text-xs uppercase tracking-widest hover:bg-stone-50 transition">
                Назад
            </a>
            <div class="text-stone-400 text-xs font-black uppercase tracking-widest">
                Стр. <span th:text="${currentPage + 1}" class="text-stone-900"></span> из <span th:text="${totalPages}"></span>
            </div>
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/dashboard(page=${currentPage + 1}, search=${searchQuery}, category=${selectedCategory})}"
               class="px-6 py-3 bg-white border border-stone-200 rounded-xl text-stone-600 font-bold text-xs uppercase tracking-widest hover:bg-stone-50 transition">
                Вперед
            </a>
        </div>
    </main>
</div>

<!-- ПЛАВАЮЩАЯ КОРЗИНА -->
<a th:if="${cartSize != null && cartSize > 0 && currentUser.role.name() == 'MANAGER'}"
   href="/cart"
   class="fixed bottom-10 right-10 z-[100] group">
    <div class="absolute inset-0 bg-[#D4652F] rounded-full animate-ping opacity-30 group-hover:opacity-50 transition-opacity"></div>
    <div class="relative bg-[#1E3A8A] text-white p-5 rounded-full shadow-2xl transform transition-all duration-300 group-hover:scale-110 group-hover:bg-[#152c6e] flex items-center justify-center">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
        <div class="absolute -top-2 -right-2 bg-[#D4652F] text-white text-[10px] font-black w-7 h-7 rounded-full flex items-center justify-center border-[3px] border-[#FFF9F8] shadow-sm"
             th:text="${cartSize}">0</div>
    </div>
    <div class="absolute right-full mr-6 top-1/2 -translate-y-1/2 bg-white text-stone-800 text-[10px] font-black uppercase tracking-widest py-3 px-5 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-xl border border-stone-100">
        К оформлению <span class="text-[#D4652F]">([[${cartSize}]])</span>
    </div>
</a>

</body>
</html>
