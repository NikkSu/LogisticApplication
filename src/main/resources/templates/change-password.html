<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Смена пароля | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #FDFBF7; } </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-3xl shadow-xl border border-stone-100 w-full max-w-md">
    <h2 class="text-2xl font-bold text-stone-800 mb-6">Безопасность</h2>

    <div th:if="${error}" class="bg-red-50 text-red-600 p-3 rounded-xl mb-6 text-sm" th:text="${error}"></div>

    <form th:action="@{/profile/change-password}" method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Текущий пароль</label>
            <input type="password" name="oldPassword" required class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none">
        </div>
        <div>
            <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Новый пароль</label>
            <input type="password" name="newPassword" required class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none">
        </div>
        <div>
            <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Подтвердите пароль</label>
            <input type="password" name="confirmPassword" required class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none">
        </div>

        <button type="submit" class="w-full py-4 bg-stone-800 text-white rounded-xl font-bold hover:bg-stone-900 transition mt-4">Обновить пароль</button>
        <a href="/profile" class="block text-center text-stone-400 text-sm mt-4">Отмена</a>
    </form>
</div>

</body>
</html>
