<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .tab-active { border-bottom: 2px solid #8B4513; color: #8B4513; }
    </style>
</head>
<body class="py-10">

<div class="max-w-4xl mx-auto px-4">
    <nav class="mb-8 flex justify-between items-center">
        <a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm">← На главную</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-red-500 text-xs font-bold uppercase tracking-widest">Выйти из системы</button>
        </form>
    </nav>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Левая колонка: Аватар и краткая инфо -->
        <!-- Левая колонка: Аватар -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 text-center">
            <!-- УМНАЯ АВАТАРКА -->
            <div class="relative group mx-auto w-24 h-24 mb-4">
                <img th:if="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}"
                     th:src="${user.avatarUrl}"
                     class="w-24 h-24 rounded-full object-cover border-4 border-stone-50 shadow-md">

                <div th:unless="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}"
                     class="w-24 h-24 bg-amber-100 text-amber-800 rounded-full flex items-center justify-center text-3xl font-bold border-4 border-white shadow-md"
                     th:text="${user.email.substring(0,1).toUpperCase()}">
                </div>
            </div>

            <!-- Форма обновления URL фото (маленькая кнопка) -->
            <form th:action="@{/profile/update-avatar}" method="post" class="mb-6">
                <input type="text" name="avatarUrl" th:value="${user.avatarUrl}"
                       placeholder="URL фотографии"
                       class="w-full text-[10px] px-2 py-1 border border-stone-100 rounded focus:outline-none mb-2">
                <button type="submit" class="text-[10px] text-stone-400 hover:text-stone-800 uppercase font-bold tracking-widest">Обновить фото</button>
            </form>

            <h2 class="text-xl font-bold text-stone-800" th:text="${user.firstName != null ? user.firstName + ' ' + user.lastName : 'Имя не указано'}"></h2>
            <p class="text-stone-400 text-sm" th:text="${user.email}"></p>
        </div>

        <!-- Правая колонка: Форма и настройки -->
        <div class="md:col-span-2 bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
            <h2 class="text-2xl font-bold text-stone-800 mb-8">Настройки профиля</h2>

            <form th:action="@{/profile/update}" method="post" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-stone-500 uppercase mb-2">Имя</label>
                        <input type="text" name="firstName" th:value="${user.firstName}" class="w-full px-4 py-2 rounded-xl border border-stone-100 focus:outline-none focus:border-amber-700 bg-stone-50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-stone-500 uppercase mb-2">Фамилия</label>
                        <input type="text" name="lastName" th:value="${user.lastName}" class="w-full px-4 py-2 rounded-xl border border-stone-100 focus:outline-none focus:border-amber-700 bg-stone-50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase mb-2">Телефон</label>
                    <input type="text" name="phone" th:value="${user.phone}" placeholder="+375 (__) ___-__-__" class="w-full px-4 py-2 rounded-xl border border-stone-100 focus:outline-none focus:border-amber-700 bg-stone-50">
                </div>

                <div class="pt-6 border-t border-stone-50 flex items-center justify-between">
                    <button type="submit" class="bg-stone-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-stone-900 transition shadow-lg shadow-stone-200">
                        Сохранить изменения
                    </button>

                    <a href="/profile/change-password" class="text-stone-400 text-sm hover:text-amber-800">Сменить пароль</a>
                </div>
            </form>

            <div class="mt-12">
                <h3 class="font-bold text-stone-800 mb-4">Ваша активность</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
                        <p class="text-2xl font-bold text-amber-900" th:text="${orderCount ?: 0}"></p>
                        <p class="text-xs text-amber-700">Заказов оформлено</p>
                    </div>
                    <div class="p-4 bg-stone-50 rounded-2xl border border-stone-100">
                        <p class="text-2xl font-bold text-stone-800">0</p>
                        <p class="text-xs text-stone-500">Избранных товаров</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
