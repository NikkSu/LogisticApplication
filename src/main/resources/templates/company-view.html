<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${company.name} + ' | Профиль компании'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 25px 30px -5px rgba(30, 58, 138, 0.05); border-color: #D4652F; }
        .map-container { transition: all 0.7s ease; }
    </style>
</head>
<body class="pb-20">

<!-- НАВИГАЦИЯ -->
<nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-stone-100 py-4 px-8 mb-12 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/dashboard" class="group flex items-center text-stone-500 hover:text-[#1E3A8A] transition font-bold text-sm">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Назад в каталог
        </a>
        <div class="px-4 py-1.5 bg-[#1E3A8A]/10 text-[#1E3A8A] rounded-full text-[10px] font-black uppercase tracking-widest">Профиль партнера</div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 lg:px-8">

    <!-- ШАПКА ПРОФИЛЯ -->
    <div class="bg-white rounded-[3rem] p-10 md:p-14 border border-stone-100 shadow-sm flex flex-col md:flex-row items-center md:items-start gap-12 mb-16 relative overflow-hidden">

        <!-- Абстрактный декор -->
        <div class="absolute -right-20 -top-20 w-64 h-64 bg-[#D4652F] opacity-5 rounded-full blur-3xl pointer-events-none"></div>

        <!-- ЛОГОТИП -->
        <div class="relative group flex-shrink-0">
            <div th:if="${company.logoUrl == null || company.logoUrl.isEmpty()}"
                 class="w-40 h-40 rounded-[2rem] bg-[#1E3A8A] text-white flex items-center justify-center font-black text-6xl uppercase shadow-xl shadow-blue-900/20"
                 th:text="${company.name.substring(0,1)}"></div>
            <img th:if="${company.logoUrl != null && !company.logoUrl.isEmpty()}"
                 th:src="${company.logoUrl}" class="w-40 h-40 rounded-[2rem] object-cover shadow-xl border-4 border-white z-10 relative group-hover:scale-105 transition-transform duration-500">
        </div>

        <!-- ИНФОРМАЦИЯ -->
        <div class="flex-1 text-center md:text-left z-10 relative">
            <h1 class="text-5xl font-black text-stone-900 mb-4 tracking-tight" th:text="${company.name}"></h1>

            <div class="flex flex-wrap justify-center md:justify-start items-center gap-4 mb-8">
                <!-- Тип компании (Синий для поставщика, Оранжевый для заказчика) -->
                <span th:class="${company.type.name() == 'SUPPLIER' ? 'bg-blue-50 text-[#1E3A8A] border-blue-100' : 'bg-orange-50 text-[#D4652F] border-orange-100'} + ' px-4 py-1.5 rounded-xl border text-[10px] font-black uppercase tracking-[0.2em]'"
                      th:text="${company.type}"></span>

                <span class="text-stone-500 text-sm font-bold flex items-center bg-stone-50 px-4 py-1.5 rounded-xl border border-stone-100">
                    <svg class="w-4 h-4 mr-2 text-[#D4652F]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    <span th:text="${company.contactEmail}"></span>
                </span>
            </div>

            <p class="text-stone-500 leading-relaxed max-w-3xl text-lg font-medium" th:text="${company.description != null && !company.description.isEmpty() ? company.description : 'Компания еще не добавила информацию о себе.'}"></p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">

        <!-- ЛЕВАЯ КОЛОНКА (ТОВАРЫ) -> 8 из 12 -->
        <div class="lg:col-span-8">
            <div class="flex items-center justify-between mb-10">
                <h2 class="text-3xl font-black text-stone-900 tracking-tight">Ассортимент поставщика</h2>
                <span class="px-4 py-1 bg-white border border-stone-200 rounded-full text-[10px] font-black text-stone-400 uppercase tracking-widest" th:text="${products.size()} + ' позиций'"></span>
            </div>

            <!-- Сетка товаров -->
            <div th:if="${!products.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                <div th:each="product : ${products}" class="product-card bg-white rounded-[2.5rem] border border-stone-100 flex flex-col group overflow-hidden shadow-sm">

                    <!-- Изображение -->
                    <a th:href="@{/product/{id}(id=${product.id})}" class="h-56 bg-stone-50 relative overflow-hidden block">
                        <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[9px] font-black text-stone-400 uppercase tracking-widest shadow-sm" th:text="${product.category != null ? product.category.name : 'Каталог'}"></div>
                    </a>

                    <!-- Контент -->
                    <div class="p-6 flex flex-col flex-1">
                        <a th:href="@{/product/{id}(id=${product.id})}" class="block flex-1 mb-6">
                            <h4 class="font-bold text-stone-800 text-xl leading-tight group-hover:text-[#D4652F] transition line-clamp-2" th:text="${product.name}"></h4>
                        </a>

                        <div class="mt-auto border-t border-stone-50 pt-5 flex items-center justify-between">
                            <span class="font-black text-2xl text-[#1E3A8A]" th:text="${#numbers.formatDecimal(product.price, 1, 2)} + ' Б'"></span>

                            <a th:href="@{/product/{id}(id=${product.id})}" class="w-12 h-12 bg-stone-50 text-stone-400 rounded-2xl flex items-center justify-center hover:bg-[#D4652F] hover:text-white transition shadow-sm">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Если товаров нет -->
            <div th:if="${products.isEmpty()}" class="bg-white rounded-[3rem] p-16 text-center border-2 border-dashed border-stone-100 shadow-sm">
                <div class="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl opacity-50">🛒</div>
                <p class="text-stone-800 font-bold text-xl mb-2">Витрина пуста</p>
                <p class="text-stone-400 text-sm font-medium">Поставщик еще не добавил ни одного товара в свой каталог.</p>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА (КАРТА) -> 4 из 12 -->
        <div class="lg:col-span-4 space-y-8 sticky top-28">
            <div class="bg-white p-8 rounded-[2.5rem] border border-stone-100 shadow-sm">
                <h3 class="font-black text-xl text-stone-900 mb-6 flex items-center">
                    <svg class="w-6 h-6 mr-3 text-[#D4652F]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Головной офис
                </h3>

                <p class="text-stone-500 font-medium mb-8 leading-relaxed bg-stone-50 p-4 rounded-2xl border border-stone-100"
                   th:text="${company.address != null && !company.address.isEmpty() ? company.address : 'Физический адрес офиса не указан.'}"></p>

                <!-- ИНТЕРАКТИВНАЯ КАРТА -->
                <div th:if="${company.address != null && !company.address.isEmpty()}"
                     class="map-container w-full h-[400px] rounded-[2rem] border-4 border-stone-50 shadow-inner grayscale hover:grayscale-0 relative overflow-hidden group">
                    <iframe th:src="'https://yandex.ru/map-widget/v1/?text=' + ${company.address}"
                            width="100%" height="100%" frameborder="0" class="absolute inset-0"></iframe>

                    <!-- Плашка "наведи чтобы активировать" -->
                    <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-stone-900/80 backdrop-blur text-white px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest opacity-100 group-hover:opacity-0 transition pointer-events-none">
                        Интерактивная карта
                    </div>
                </div>

                <div th:unless="${company.address != null && !company.address.isEmpty()}"
                     class="w-full h-64 rounded-[2rem] border-2 border-dashed border-stone-100 bg-stone-50 flex items-center justify-center">
                    <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest text-center px-6">Карта недоступна</p>
                </div>
            </div>

            <p class="text-[9px] text-center text-stone-300 font-black uppercase tracking-[0.2em]">
                Logistics Hub verified partner
            </p>
        </div>

    </div>
</div>

</body>
</html>
