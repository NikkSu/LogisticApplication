<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F5F5DC; font-family: 'Segoe UI', sans-serif; }
        .form-card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #8B4513; color: white; transition: 0.3s; }
        .btn-primary:hover { background-color: #5D2E0B; }
        .input-field { border: 1px solid #D2B48C; border-radius: 8px; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="form-card p-8 w-full max-w-md">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-stone-800">Вход в систему</h2>
    </div>

    <!-- Блок общей ошибки (если неправильный пароль) -->
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/login-submit}" th:object="${loginRequest}" method="post" class="space-y-4">
        <div>
            <label class="block text-stone-700 font-medium mb-1">Email</label>
            <input type="email" th:field="*{email}" required
                   class="input-field w-full px-4 py-2" />
        </div>
        <div>
            <label class="block text-stone-700 font-medium mb-1">Пароль</label>
            <input type="password" th:field="*{password}" required
                   class="input-field w-full px-4 py-2" />
        </div>
        <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold">
            Войти
        </button>
    </form>

    <div class="mt-6 text-center text-sm">
        <a href="/register" class="text-amber-800 font-bold hover:underline">Зарегистрироваться</a>
    </div>
</div>

</body>
</html>
