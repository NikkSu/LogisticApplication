<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; overflow: hidden; }
        .blob { position: absolute; z-index: -1; filter: blur(80px); opacity: 0.4; border-radius: 50%; }
        /* ЖЕСТКО ФИКСИРУЕМ ВЫСОТУ ДЛЯ ДЕСКТОПОВ */
        @media (min-width: 768px) { .auth-container { height: 750px; } }
        .input-focus:focus { border-color: #D4652F; box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1); }
        .btn-primary { background-color: #D4652F; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #b54d24; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(212, 101, 47, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">
<div class="blob w-96 h-96 bg-[#D4652F] -top-20 -left-20"></div>
<div class="blob w-80 h-80 bg-[#1E3A8A] -bottom-20 -right-20"></div>

<div class="auth-container w-full max-w-5xl flex flex-col md:flex-row m-4 bg-white rounded-[3rem] shadow-2xl shadow-stone-200/50 overflow-hidden">

    <!-- Левая часть -->
    <div class="hidden md:flex flex-col justify-center p-16 bg-[#1E3A8A] text-white w-1/2 relative overflow-hidden">
        <div class="relative z-10">
            <h1 class="text-5xl font-extrabold mb-6 leading-tight">Logistics <br/><span class="text-[#D4652F]">Hub</span></h1>
            <p class="text-blue-100 text-lg leading-relaxed opacity-80">Автоматизация закупок и <br/> интеллектуальный анализ данных</p>
        </div>
        <div class="absolute top-0 right-0 w-full h-full opacity-10 pointer-events-none">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" class="w-full h-full scale-150">
                <path fill="#FFFFFF" d="M44.7,-76.4C58.1,-69.2,69.2,-57.1,76.5,-43.1C83.8,-29.1,87.4,-13.2,85.2,1.8C83,16.8,75,30.8,65.1,43.2C55.2,55.6,43.4,66.4,29.7,72.4C16,78.5,0.4,79.8,-15.4,76.5C-31.1,73.1,-47.1,65.1,-59.4,52.8C-71.7,40.5,-80.4,24,-82.9,6.5C-85.4,-11,-81.7,-29.4,-72,-44.6C-62.3,-59.8,-46.6,-71.8,-30.9,-77.8C-15.3,-83.8,0.3,-83.8,15.6,-81.5C30.9,-79.2,44.7,-76.4,44.7,-76.4Z" transform="translate(100 100)" />
            </svg>
        </div>
    </div>

    <!-- Правая часть: Форма -->
    <div class="p-10 md:px-16 w-full md:w-1/2 flex flex-col justify-center">
        <div class="mb-8 text-center md:text-left">
            <h2 class="text-3xl font-black text-stone-900 mb-2">С возвращением!</h2>
            <p class="text-stone-400 text-sm font-medium">Войдите, чтобы продолжить работу</p>
        </div>

        <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded-xl mb-6 text-sm animate-pulse">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/login-submit}" th:object="${loginRequest}" method="post" class="space-y-5 flex-grow-0">
            <div class="space-y-1">
                <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em] ml-2">Email адрес</label>
                <input type="email" th:field="*{email}" required placeholder="office@company.com"
                       class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800" />
            </div>
            <div class="space-y-1">
                <div class="flex justify-between items-center px-2">
                    <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em]">Пароль</label>
                    <a href="/forgot-password" class="text-[10px] font-black uppercase text-[#D4652F] hover:text-[#b54d24] transition">Забыли?</a>
                </div>
                <input type="password" th:field="*{password}" required placeholder="••••••••"
                       class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800" />
            </div>

            <button type="submit" class="btn-primary w-full py-5 rounded-2xl text-white font-extrabold text-sm uppercase tracking-widest mt-4">
                Войти в систему
            </button>
        </form>

        <div class="relative my-8 text-center">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-stone-100"></div></div>
            <span class="relative bg-white px-4 text-[10px] font-black text-stone-300 uppercase tracking-widest">Или</span>
        </div>

        <a href="/oauth2/authorization/google" class="flex items-center justify-center space-x-3 w-full py-4 border-2 border-stone-100 rounded-2xl hover:bg-stone-50 transition-all font-bold text-sm text-stone-600 mb-6">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Войти через Google</span>
        </a>

        <div class="text-center mt-auto">
            <p class="text-stone-400 text-sm">Нет аккаунта? <a href="/register" class="text-[#D4652F] font-black hover:underline ml-1">Создать сейчас</a></p>
        </div>
    </div>
</div>

</body>
</html>
