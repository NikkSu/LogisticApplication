<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление компанией | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .owner-badge { background-color: #8B4513; color: white; }
        .admin-badge { background-color: #3b82f6; color: white; }
        .member-badge { background-color: #D2B48C; color: #5D2E0B; }
        .tooltip-arrow {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: #1c1917;
        }
    </style>
</head>
<body class="py-10">

<div class="max-w-6xl mx-auto px-4">
    <div class="flex justify-between items-center mb-8">
        <a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm flex items-center transition">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Назад на витрину
        </a>
        <div class="flex items-center space-x-4">
            <span class="text-stone-500 text-sm font-medium" th:text="${currentUser.email}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-red-600 font-bold text-sm hover:underline">Выйти</button>
            </form>
        </div>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100 mb-8 flex items-center justify-between">
        <div class="flex items-center space-x-6">
            <div th:if="${company.logoUrl == null || company.logoUrl.isEmpty()}"
                 class="w-16 h-16 rounded-2xl bg-stone-800 text-white flex items-center justify-center font-bold text-2xl uppercase"
                 th:text="${company.name.substring(0,1)}"></div>
            <img th:if="${company.logoUrl != null && !company.logoUrl.isEmpty()}"
                 th:src="${company.logoUrl}" class="w-16 h-16 rounded-2xl object-cover">
            <div>
                <h1 class="text-2xl font-bold text-stone-800" th:text="${company.name}"></h1>
                <p class="text-stone-500 text-sm" th:text="${company.type == T(com.logistics.suppliers.model.CompanyType).SUPPLIER ? 'Поставщик' : 'Заказчик'}"></p>
            </div>
        </div>
        <div th:class="${isOwner ? 'owner-badge' : 'member-badge'} + ' px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest'"
             th:text="${isOwner ? 'Владелец' : 'Сотрудник'}">
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">

        <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
            <h2 class="text-xl font-bold text-stone-800 mb-6">Команда</h2>
            <div class="space-y-4">
                <div th:each="emp : ${employees}" class="flex items-center justify-between p-4 rounded-2xl border border-transparent hover:border-stone-100 transition hover:bg-stone-50">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 font-bold"
                             th:text="${emp.email.substring(0,1).toUpperCase()}"></div>
                        <div>
                            <div class="flex items-center space-x-2">
                                <p class="text-stone-800 font-semibold" th:text="${emp.email}"></p>

                                <div th:if="${company.owner != null && emp.id == company.owner.id}" class="relative group">
                                    <span class="cursor-help text-amber-500">👑</span>
                                    <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded shadow-lg z-50">
                                        Основатель компании
                                        <div class="tooltip-arrow"></div>
                                    </div>
                                </div>

                                <div th:if="${emp.canManageEmployees && (company.owner == null || emp.id != company.owner.id)}" class="relative group">
                                    <span class="cursor-help text-blue-500">🛡️</span>
                                    <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded shadow-lg z-50">
                                        Имеет права управления
                                        <div class="tooltip-arrow"></div>
                                    </div>
                                </div>
                            </div>
                            <p class="text-[10px] text-stone-400 font-bold uppercase" th:text="${emp.role}"></p>
                        </div>
                    </div>

                    <div class="flex items-center space-x-2">
                        <div class="relative group" th:if="${isOwner && emp.id != currentUser.id}">
                            <form th:action="@{/companies/transfer-ownership/{id}(id=${emp.id})}" method="post" onsubmit="return confirm('Передать владение?');">
                                <button type="submit" class="text-[10px] bg-amber-600 text-white px-3 py-1.5 rounded-lg font-bold">Отдать Владение</button>
                            </form>
                            <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded z-50">
                                Сделать владельцем
                                <div class="tooltip-arrow"></div>
                            </div>
                        </div>

                        <div class="relative group" th:if="${isOwner && emp.id != currentUser.id}">
                            <form th:action="@{/companies/employees/{id}/toggle-permission(id=${emp.id})}" method="post">
                                <button type="submit" th:class="${emp.canManageEmployees ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-stone-50 text-stone-400 border-stone-100'} + ' text-[10px] px-3 py-1.5 rounded-lg font-bold border transition'"
                                        th:text="${emp.canManageEmployees ? 'Убрать админку' : 'Дать админку'}"></button>
                            </form>
                            <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded z-50">
                                <span th:text="${emp.canManageEmployees ? 'Отозвать права управления' : 'Разрешить управлять заявками'}"></span>
                                <div class="tooltip-arrow"></div>
                            </div>
                        </div>

                        <div class="relative group" th:if="${canManage && emp.id != currentUser.id && (company.owner == null || emp.id != company.owner.id)}">
                            <form th:action="@{/companies/employees/{id}/kick(id=${emp.id})}" method="post" onsubmit="return confirm('Исключить?');">
                                <button type="submit" class="text-[10px] text-red-600 border border-red-100 px-3 py-1.5 rounded-lg font-bold uppercase hover:bg-red-50">Исключить</button>
                            </form>
                            <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-red-600 text-white text-[10px] px-2 py-1 rounded z-50 font-bold uppercase">
                                Удалить из команды
                                <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-red-600"></div>
                            </div>
                        </div>

                        <span th:if="${emp.id == currentUser.id}" class="text-[10px] text-stone-300 italic">Это вы</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                <h3 class="font-bold text-lg text-stone-800 mb-6 flex items-center">
                    <span class="mr-2 text-amber-700">📊</span> Сводка компании
                </h3>

                <div class="space-y-4 mb-8">
                    <div class="flex justify-between items-center py-3 border-b border-stone-50">
                        <span class="text-stone-400 text-sm font-medium">В команде:</span>
                        <div class="flex items-center">
                            <span class="font-bold text-stone-800 text-lg mr-1" th:text="${employees.size()}">0</span>
                            <span class="text-stone-400 text-xs uppercase font-bold tracking-tighter">чел.</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center py-3 border-b border-stone-50">
                        <span class="text-stone-400 text-sm font-medium">Деятельность:</span>
                        <span th:class="${company.type == T(com.logistics.suppliers.model.CompanyType).SUPPLIER ? 'text-amber-700 bg-amber-50' : 'text-stone-600 bg-stone-100'} + ' font-bold text-[10px] px-2 py-1 rounded-lg uppercase tracking-wider'"
                              th:text="${company.type}">
                        </span>
                    </div>

                    <div class="flex justify-between items-center py-3">
                        <span class="text-stone-400 text-sm font-medium">Статус:</span>
                        <span class="flex items-center text-green-600 text-[10px] font-bold uppercase">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>
                            Активна
                        </span>
                    </div>
                </div>

                <form th:action="@{/companies/leave}" method="post" onsubmit="return confirm('Покинуть компанию?');">
                    <button type="submit" class="w-full py-4 border border-red-100 text-red-600 rounded-2xl text-xs font-bold hover:bg-red-50 transition uppercase tracking-widest">
                        Покинуть компанию
                    </button>
                </form>
            </div>

            <div th:if="${canManage}" class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                <h2 class="text-xl font-bold text-stone-800 mb-4">Входящие заявки</h2>
                <div th:if="${requests == null || requests.isEmpty()}" class="text-center py-6 text-stone-400 text-xs italic">Заявок нет</div>

                <div class="space-y-4">
                    <div th:each="req : ${requests}" class="p-4 border border-amber-100 bg-amber-50/30 rounded-2xl">
                        <p class="text-sm font-bold text-stone-800 mb-3 text-center" th:text="${req.user.email}"></p>
                        <div class="flex space-x-2">
                            <form th:action="@{/companies/requests/{id}/approve(id=${req.id})}" method="post" class="flex-1">
                                <button type="submit" class="w-full py-2 bg-stone-800 text-white text-[10px] font-bold rounded-lg uppercase">Принять</button>
                            </form>
                            <form th:action="@{/companies/requests/{id}/reject(id=${req.id})}" method="post" class="flex-1">
                                <button type="submit" class="w-full py-2 bg-white border border-stone-200 text-stone-400 text-[10px] font-bold rounded-lg uppercase">Отказ</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
