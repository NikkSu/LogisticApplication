<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление компанией | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        .owner-badge { background-color: #D4652F; color: white; }
        .member-badge { background-color: #1E3A8A; color: white; }

        /* Тултипы: только при наведении на конкретную кнопку в панели */
        .btn-group { position: relative; }
        .tooltip {
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            background: #1c1917; color: white; padding: 6px 10px; border-radius: 8px;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            white-space: nowrap; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 60;
        }
        .btn-group:hover .tooltip { opacity: 1; visibility: visible; }

        .action-icon-btn { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 14px; transition: all 0.3s; }
        .hidden-panel { display: none; }

        /* Плавное свечение карточек */
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="py-10">

<div class="max-w-7xl mx-auto px-4 lg:px-8">
    <!-- Навигация -->
    <nav class="flex justify-between items-center mb-10">
        <a href="/dashboard" class="group flex items-center text-stone-400 hover:text-[#1E3A8A] transition font-bold text-sm">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Вернуться в каталог
        </a>
        <div class="flex items-center space-x-6">
            <span class="text-stone-500 text-sm font-semibold" th:text="${currentUser.email}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="bg-white border border-stone-200 px-4 py-2 rounded-xl text-red-500 font-black uppercase text-[9px] tracking-widest hover:bg-red-50 transition">Выйти</button>
            </form>
        </div>
    </nav>

    <!-- ШАПКА -->
    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-100 mb-6 flex flex-col md:flex-row items-center justify-between gap-8">
        <div class="flex items-center space-x-8">
            <div th:if="${company.logoUrl == null || company.logoUrl.isEmpty()}"
                 class="w-24 h-24 rounded-3xl bg-[#1E3A8A] text-white flex items-center justify-center font-black text-4xl shadow-xl shadow-blue-900/20"
                 th:text="${company.name.substring(0,1)}"></div>
            <img th:if="${company.logoUrl != null && !company.logoUrl.isEmpty()}"
                 th:src="${company.logoUrl}" class="w-24 h-24 rounded-3xl object-cover shadow-lg">
            <div>
                <h1 class="text-4xl font-black text-stone-900 tracking-tight" th:text="${company.name}"></h1>
                <p class="inline-block px-3 py-1 bg-stone-50 text-stone-400 rounded-lg text-[10px] font-black uppercase tracking-widest mt-2" th:text="${company.type}"></p>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <button th:if="${canManage}" onclick="document.getElementById('edit-modal').classList.remove('hidden')"
                    class="px-8 py-4 bg-stone-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-black transition shadow-xl shadow-stone-300">
                Настройки профиля
            </button>
            <div th:class="${isOwner ? 'owner-badge' : 'member-badge'} + ' px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg'"
                 th:text="${isOwner ? 'Владелец' : 'Сотрудник'}"></div>
        </div>
    </div>

    <!-- ГОРИЗОНТАЛЬНАЯ СТАТИСТИКА -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm flex items-center justify-between">
            <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">ID Компании</span>
            <span class="font-mono font-bold text-[#1E3A8A] bg-blue-50 px-3 py-1 rounded-lg" th:text="${company.id}"></span>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm flex items-center justify-between">
            <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">Текущий штат</span>
            <span class="font-black text-2xl text-stone-800" th:text="${employees.size()}"></span>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm flex items-center justify-between">
            <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">Лимит бюджета</span>
            <span class="font-black text-[#D4652F]" th:text="${company.monthlyBudget != null ? company.monthlyBudget + ' Б' : 'Не установлен'}"></span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">

        <!-- ЛЕВАЯ КОЛОНКА (КОМАНДА) -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-stone-100">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-2xl font-black text-stone-900 uppercase tracking-tight">Команда</h2>
                    <a href="/orders/my" class="px-5 py-2 bg-stone-50 text-stone-600 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-[#1E3A8A] hover:text-white transition">Все заказы компании →</a>
                </div>

                <div class="space-y-4">
                    <div th:each="emp : ${employees}" class="p-6 rounded-[2.5rem] bg-[#FFFDFD] border border-stone-50 hover:border-[#D4652F]/20 transition-all duration-300">

                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-6 min-w-0 flex-1">
                                <div class="w-14 h-14 rounded-2xl bg-white border border-stone-100 flex items-center justify-center text-[#1E3A8A] font-black text-xl shadow-sm"
                                     th:text="${emp.email.substring(0,1).toUpperCase()}"></div>
                                <div class="min-w-0 flex-1">
                                    <p class="text-xl font-black text-stone-800 break-all leading-tight mb-2" th:text="${emp.email}"></p>
                                    <div class="flex items-center space-x-3">
                                        <span th:class="${emp.role.name() == 'ANALYST' ? 'text-purple-600 bg-purple-50' : 'text-stone-400 bg-stone-50'} + ' px-2 py-0.5 rounded text-[8px] font-black uppercase tracking-widest border border-black/5'" th:text="${emp.role}"></span>
                                        <span th:if="${company.owner != null && emp.id == company.owner.id}" class="text-[8px] font-black text-amber-600 uppercase flex items-center">
                                            <span class="w-1.5 h-1.5 bg-amber-500 rounded-full mr-1.5"></span> Основатель
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div class="flex items-center space-x-4">
                                <span th:if="${emp.id == currentUser.id}" class="text-[9px] font-black text-stone-300 uppercase tracking-widest mr-4">Вы</span>
                                <button th:if="${(isOwner || canManage) && emp.id != currentUser.id}"
                                        th:onclick="'toggleActions(' + ${emp.id} + ')'"
                                        class="px-5 py-3 bg-white border border-stone-200 rounded-2xl hover:border-[#D4652F] text-stone-700 font-black text-[10px] uppercase tracking-widest shadow-sm transition-all active:scale-95">
                                    Действия
                                </button>
                            </div>
                        </div>

                        <!-- ВЫДВИЖНАЯ ПАНЕЛЬ УПРАВЛЕНИЯ -->
                        <div th:id="'actions-' + ${emp.id}" class="hidden-panel pt-8 mt-8 border-t border-stone-100 animate-fade-in">
                            <div class="flex flex-wrap items-center gap-4">

                                <!-- Владение -->
                                <div class="btn-group" th:if="${isOwner}">
                                    <form th:action="@{/companies/transfer-ownership/{id}(id=${emp.id})}" method="post" onsubmit="return confirm('Передать права владельца?');">
                                        <button type="submit" class="action-icon-btn bg-amber-50 text-amber-600 hover:bg-amber-600 hover:text-white shadow-sm border border-amber-100">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                                        </button>
                                    </form>
                                    <div class="tooltip font-black">Сделать главным</div>
                                </div>

                                <!-- Роль -->
                                <div class="btn-group" th:if="${isOwner}">
                                    <form th:action="@{/companies/employees/{id}/change-role(id=${emp.id})}" method="post">
                                        <select name="newRole" onchange="this.form.submit()" class="h-[48px] px-4 bg-stone-50 text-stone-800 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] cursor-pointer font-black text-[10px] uppercase tracking-widest">
                                            <th:block th:if="${company.type.name() == 'SUPPLIER'}">
                                                <option th:value="SUPPLIER" th:selected="${emp.role.name() == 'SUPPLIER'}">Менеджер</option>
                                                <option th:value="ANALYST" th:selected="${emp.role.name() == 'ANALYST'}">Аналитик</option>
                                            </th:block>
                                            <th:block th:if="${company.type.name() == 'CUSTOMER'}">
                                                <option th:value="MANAGER" th:selected="${emp.role.name() == 'MANAGER'}">Закупщик</option>
                                                <option th:value="ANALYST" th:selected="${emp.role.name() == 'ANALYST'}">Аналитик</option>
                                            </th:block>
                                        </select>
                                    </form>
                                    <div class="tooltip font-black">Изменить роль</div>
                                </div>

                                <!-- Модерация -->
                                <div class="btn-group" th:if="${isOwner}">
                                    <form th:action="@{/companies/employees/{id}/toggle-permission(id=${emp.id})}" method="post">
                                        <button type="submit" th:class="${emp.canManageEmployees ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-100'} + ' action-icon-btn shadow-sm'">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.954 0 0112 2.944a11.955 11.954 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                        </button>
                                    </form>
                                    <div class="tooltip font-black">Права модератора</div>
                                </div>

                                <!-- Исключение -->
                                <div class="btn-group ml-auto" th:if="${canManage && (company.owner == null || emp.id != company.owner.id)}">
                                    <form th:action="@{/companies/employees/{id}/kick(id=${emp.id})}" method="post" onsubmit="return confirm('Удалить сотрудника?');">
                                        <button type="submit" class="action-icon-btn bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border border-red-100">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </form>
                                    <div class="tooltip font-black bg-red-600">Уволить</div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ КОЛОНКА (ЗАЯВКИ И ИНФО) -->
        <div class="lg:col-span-4 space-y-6">

            <!-- ЗАЯВКИ -->
            <div th:if="${canManage}" class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
                <h2 class="text-lg font-black text-stone-900 mb-6 uppercase tracking-widest flex items-center">
                    <span class="w-1.5 h-5 bg-[#1E3A8A] rounded-full mr-3"></span>
                    Новые заявки
                </h2>
                <div th:if="${requests == null || requests.isEmpty()}" class="py-6 text-center text-stone-400 italic text-xs font-medium">Запросов на вступление нет</div>
                <div th:each="req : ${requests}" class="p-6 bg-[#FFFDFD] rounded-[2rem] border border-stone-100 mb-4 transition-all hover:border-[#1E3A8A]/30">
                    <p class="text-[11px] font-black text-stone-800 mb-4 break-all text-center uppercase tracking-tighter" th:text="${req.user.email}"></p>
                    <div class="flex gap-2">
                        <form th:action="@{/companies/requests/{id}/approve(id=${req.id})}" method="post" class="flex-1"><button class="w-full py-3 bg-[#1E3A8A] text-white text-[10px] font-black uppercase rounded-xl hover:shadow-lg transition-all">Принять</button></form>
                        <form th:action="@{/companies/requests/{id}/reject(id=${req.id})}" method="post" class="flex-1"><button class="w-full py-3 bg-white border border-stone-200 text-stone-400 text-[10px] font-black uppercase rounded-xl hover:bg-red-50 hover:text-red-500 transition-all">Отказ</button></form>
                    </div>
                </div>
            </div>

            <!-- ИНФОРМАЦИЯ -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-stone-100">
                <h3 class="text-lg font-black text-stone-900 mb-4 uppercase tracking-widest italic">О компании</h3>
                <p class="text-stone-600 leading-relaxed text-sm font-medium mb-8" th:text="${company.description != null ? company.description : 'Описание пока не добавлено.'}"></p>

                <div class="space-y-3 pt-6 border-t border-stone-50">
                    <p class="text-[10px] font-black uppercase text-stone-400 tracking-widest mb-4">Наш офис</p>
                    <p class="text-stone-800 text-xs font-bold" th:text="${company.address}"></p>
                    <div th:if="${company.address != null}" class="w-full h-48 rounded-2xl overflow-hidden grayscale hover:grayscale-0 transition-all duration-700 border border-stone-100">
                        <iframe width="100%" height="100%" frameborder="0" th:src="'https://yandex.ru/map-widget/v1/?text=' + ${company.address}"></iframe>
                    </div>
                </div>

                <form th:action="@{/companies/leave}" method="post" onsubmit="return confirm('Выйти из состава организации?');" class="mt-8 pt-6 border-t border-stone-50">
                    <button type="submit" class="w-full py-4 text-red-500 font-black text-[9px] uppercase tracking-[0.2em] hover:bg-red-50 rounded-2xl transition">Покинуть ряды</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛКА НАСТРОЕК (ЛОГИКА НЕ ИЗМЕНЕНА) -->
<div id="edit-modal" class="hidden fixed inset-0 bg-[#1E3A8A]/40 backdrop-blur-md z-[300] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-xl p-12 rounded-[3.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-3xl font-black text-stone-900 mb-8 tracking-tight text-center">Настройки компании</h2>
        <form th:action="@{/companies/my/update}" method="post" class="space-y-5">
            <div><label class="text-[9px] font-black uppercase text-stone-400 ml-3 mb-1 block tracking-widest">Название</label><input type="text" name="name" th:value="${company.name}" class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800 transition"></div>
            <div><label class="text-[9px] font-black uppercase text-stone-400 ml-3 mb-1 block tracking-widest">Email для контактов</label><input type="email" name="contactEmail" th:value="${company.contactEmail}" class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800 transition"></div>
            <div><label class="text-[9px] font-black uppercase text-stone-400 ml-3 mb-1 block tracking-widest">Юридический адрес</label><input type="text" name="address" th:value="${company.address}" class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-bold text-stone-800 transition"></div>
            <div><label class="text-[9px] font-black uppercase text-stone-400 ml-3 mb-1 block tracking-widest">URL Логотипа</label><input type="text" name="logoUrl" th:value="${company.logoUrl}" class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-medium text-stone-600 transition"></div>
            <div><label class="text-[9px] font-black uppercase text-stone-400 ml-3 mb-1 block tracking-widest">Описание</label><textarea name="description" th:text="${company.description}" rows="3" class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-[#D4652F] outline-none font-medium text-stone-700 transition"></textarea></div>
            <div class="pt-6 border-t border-stone-100 flex space-x-4">
                <button type="button" onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 py-4 text-stone-400 font-black uppercase tracking-widest text-[10px]">Отмена</button>
                <button type="submit" class="flex-1 py-4 bg-[#D4652F] text-white rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-[#b54d24] transition shadow-xl shadow-orange-900/20">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleActions(id) {
        const panel = document.getElementById('actions-' + id);
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            document.querySelectorAll('.hidden-panel').forEach(p => p.style.display = 'none');
            panel.style.display = 'block';
        }
    }

    setTimeout(() => {
        const toast = document.getElementById('toast');
        if(toast) { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }
    }, 4000);
</script>

</body>
</html>
