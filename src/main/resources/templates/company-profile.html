<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление компанией | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .owner-badge { background-color: #8B4513; color: white; }
        .member-badge { background-color: #D2B48C; color: #5D2E0B; }
        .tooltip-arrow { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: #1c1917; }
    </style>
</head>
<body class="py-10">

<div class="max-w-6xl mx-auto px-4">
    <!-- Уведомление (Toast) -->
    <div th:if="${message}" id="toast" class="fixed top-5 right-5 z-[200] bg-white border-l-4 border-amber-600 p-4 shadow-2xl rounded-r-xl transition-all duration-500">
        <p class="text-xs font-black uppercase text-stone-400 mb-1" th:text="${messageType == 'success' ? 'Успех' : 'Ошибка'}"></p>
        <p class="text-stone-800 font-bold" th:text="${message}"></p>
    </div>

    <!-- Навигация -->
    <div class="flex justify-between items-center mb-8">
        <a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm flex items-center transition">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Назад на витрину
        </a>
        <div class="flex items-center space-x-4">
            <span class="text-stone-500 text-sm font-medium" th:text="${currentUser.email}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-red-600 font-bold text-sm hover:underline">Выйти</button>
            </form>
        </div>
    </div>

    <!-- ШАПКА -->
    <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100 mb-8 flex items-center justify-between">
        <div class="flex items-center space-x-6">
            <div th:if="${company.logoUrl == null || company.logoUrl.isEmpty()}"
                 class="w-16 h-16 rounded-2xl bg-stone-800 text-white flex items-center justify-center font-bold text-2xl uppercase"
                 th:text="${company.name.substring(0,1)}"></div>
            <img th:if="${company.logoUrl != null && !company.logoUrl.isEmpty()}"
                 th:src="${company.logoUrl}" class="w-16 h-16 rounded-2xl object-cover">
            <div>
                <h1 class="text-2xl font-bold text-stone-800" th:text="${company.name}"></h1>
                <p class="text-stone-500 text-sm" th:text="${company.type == T(com.logistics.suppliers.model.CompanyType).SUPPLIER ? 'Поставщик' : 'Заказчик'}"></p>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <!-- КНОПКА НАСТРОЕК -->
            <button th:if="${canManage}" onclick="document.getElementById('edit-modal').classList.remove('hidden')"
                    class="px-4 py-2 bg-stone-100 text-stone-600 rounded-xl text-xs font-bold hover:bg-stone-200 transition">
                ⚙️ Настройки
            </button>
            <div th:class="${isOwner ? 'owner-badge' : 'member-badge'} + ' px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest'"
                 th:text="${isOwner ? 'Владелец' : 'Сотрудник'}"></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
        <div class="lg:col-span-2 space-y-8">
            <!-- КОМАНДА -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                <h2 class="text-xl font-bold text-stone-800 mb-6">Команда</h2>
                <div class="space-y-4">
                    <div th:each="emp : ${employees}" class="flex items-center justify-between p-4 rounded-2xl border border-transparent hover:border-stone-100 transition hover:bg-stone-50">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 font-bold"
                                 th:text="${emp.email.substring(0,1).toUpperCase()}"></div>
                            <div>
                                <div class="flex items-center space-x-2">
                                    <p class="text-stone-800 font-semibold" th:text="${emp.email}"></p>
                                    <div th:if="${company.owner != null && emp.id == company.owner.id}" class="relative group">
                                        <span class="cursor-help text-amber-500">👑</span>
                                        <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded shadow-lg z-50">Основатель компании<div class="tooltip-arrow"></div></div>
                                    </div>
                                    <div th:if="${emp.canManageEmployees && (company.owner == null || emp.id != company.owner.id)}" class="relative group">
                                        <span class="cursor-help text-blue-500">🛡️</span>
                                        <div class="absolute bottom-full mb-1 left-1/2 -translate-x-1/2 hidden group-hover:block w-max bg-stone-800 text-white text-[10px] px-2 py-1 rounded shadow-lg z-50">Имеет права управления<div class="tooltip-arrow"></div></div>
                                    </div>
                                </div>
                                <p class="text-[10px] text-stone-400 font-bold uppercase" th:text="${emp.role}"></p>
                            </div>
                        </div>

                        <!-- ДЕЙСТВИЯ -->
                        <div class="flex items-center space-x-2">
                            <div class="relative group" th:if="${isOwner && emp.id != currentUser.id}">
                                <form th:action="@{/companies/transfer-ownership/{id}(id=${emp.id})}" method="post" onsubmit="return confirm('Передать владение?');">
                                    <button type="submit" class="text-[10px] bg-amber-600 text-white px-3 py-1.5 rounded-lg font-bold">Отдать Владение</button>
                                </form>
                            </div>
                            <form th:if="${isOwner && emp.id != currentUser.id}" th:action="@{/companies/employees/{id}/change-role(id=${emp.id})}" method="post" class="flex items-center">
                                <select name="newRole" onchange="this.form.submit()" class="text-[10px] font-bold uppercase bg-stone-50 border border-stone-100 rounded-lg px-2 py-1.5 focus:ring-1 focus:ring-amber-700 outline-none cursor-pointer">
                                    <th:block th:if="${company.type.name() == 'SUPPLIER'}">
                                        <option th:value="SUPPLIER" th:selected="${emp.role.name() == 'SUPPLIER'}">Сотрудник</option>
                                        <option th:value="ANALYST" th:selected="${emp.role.name() == 'ANALYST'}">Аналитик</option>
                                    </th:block>
                                    <th:block th:if="${company.type.name() == 'CUSTOMER'}">
                                        <option th:value="MANAGER" th:selected="${emp.role.name() == 'MANAGER'}">Менеджер</option>
                                        <option th:value="ANALYST" th:selected="${emp.role.name() == 'ANALYST'}">Аналитик</option>
                                    </th:block>
                                </select>
                            </form>
                            <form th:if="${isOwner && emp.id != currentUser.id}" th:action="@{/companies/employees/{id}/toggle-permission(id=${emp.id})}" method="post">
                                <button type="submit" th:class="${emp.canManageEmployees ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-stone-50 text-stone-400 border-stone-100'} + ' text-[10px] px-3 py-1.5 rounded-lg font-bold border transition'" th:text="${emp.canManageEmployees ? 'Убрать админку' : 'Дать админку'}"></button>
                            </form>
                            <form th:if="${canManage && emp.id != currentUser.id && (company.owner == null || emp.id != company.owner.id)}" th:action="@{/companies/employees/{id}/kick(id=${emp.id})}" method="post" onsubmit="return confirm('Исключить?');">
                                <button type="submit" class="text-[10px] text-red-600 border border-red-100 px-3 py-1.5 rounded-lg font-bold uppercase hover:bg-red-50">Исключить</button>
                            </form>
                            <span th:if="${emp.id == currentUser.id}" class="text-[10px] text-stone-300 italic">Это вы</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ИНФО О КОМПАНИИ И КАРТА -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                <h3 class="text-xl font-bold text-stone-800 mb-4 italic">О компании</h3>
                <p class="text-stone-600 leading-relaxed mb-8" th:text="${company.description != null ? company.description : 'Описание пока не заполнено.'}"></p>
                <h3 class="text-lg font-bold text-stone-800 mb-4">Наш адрес</h3>
                <p class="text-stone-400 text-sm mb-6" th:text="${company.address != null ? company.address : 'Адрес не указан'}"></p>
                <div th:if="${company.address != null}" class="w-full h-80 rounded-2xl overflow-hidden border border-stone-50">
                    <iframe width="100%" height="100%" frameborder="0" th:src="'https://yandex.ru/map-widget/v1/?text=' + ${company.address}"></iframe>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <!-- СВОДКА -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                <h3 class="font-bold text-lg text-stone-800 mb-6 flex items-center italic">📊 Сводка</h3>
                <div class="space-y-4 mb-8 text-sm">
                    <div class="flex justify-between border-b border-stone-50 pb-3"><span class="text-stone-400">ID поиска:</span><span class="font-mono font-bold" th:text="${company.id}"></span></div>
                    <div class="flex justify-between border-b border-stone-50 pb-3"><span class="text-stone-400">Команда:</span><span class="font-bold" th:text="${employees.size()} + ' чел.'"></span></div>
                    <div class="flex justify-between pb-3"><span class="text-stone-400">Тип:</span><span class="font-bold text-amber-700 uppercase text-xs" th:text="${company.type}"></span></div>
                </div>
                <div class="space-y-3 mb-6">
                    <a href="/orders/my" class="block w-full text-center py-4 bg-stone-800 text-white rounded-2xl text-sm font-bold hover:bg-black transition shadow-lg shadow-stone-200">
                        <span th:text="${company.type == T(com.logistics.suppliers.model.CompanyType).SUPPLIER ? '📦 Входящие заказы' : '📑 История закупок'}"></span>
                    </a>
                    <a th:if="${company.type == T(com.logistics.suppliers.model.CompanyType).SUPPLIER}" href="/my-products" class="block w-full text-center py-4 bg-white border border-amber-200 text-amber-800 rounded-2xl text-sm font-bold hover:bg-amber-50 transition">🧺 Управление товарами</a>
                </div>
                <form th:action="@{/companies/leave}" method="post" onsubmit="return confirm('Покинуть компанию?');">
                    <button type="submit" class="w-full py-4 border border-red-100 text-red-600 rounded-2xl text-[10px] font-bold hover:bg-red-50 transition uppercase tracking-widest">Покинуть компанию</button>
                </form>
            </div>

            <!-- ЗАЯВКИ -->
            <div th:if="${canManage}" class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100">
                <h2 class="text-xl font-bold text-stone-800 mb-4 flex items-center"><span class="mr-2 italic text-amber-600">📩</span> Входящие заявки</h2>
                <div th:if="${requests == null || requests.isEmpty()}" class="text-center py-6 text-stone-400 text-xs italic">Заявок нет</div>
                <div th:each="req : ${requests}" class="p-4 border border-amber-100 bg-amber-50/30 rounded-2xl mb-4 text-center">
                    <p class="text-xs font-bold text-stone-800 mb-3 truncate" th:text="${req.user.email}"></p>
                    <div class="flex space-x-2">
                        <form th:action="@{/companies/requests/{id}/approve(id=${req.id})}" method="post" class="flex-1"><button class="w-full py-2 bg-stone-800 text-white text-[10px] font-black uppercase rounded-xl">Ok</button></form>
                        <form th:action="@{/companies/requests/{id}/reject(id=${req.id})}" method="post" class="flex-1"><button class="w-full py-2 bg-white border border-stone-200 text-stone-400 text-[10px] font-black uppercase rounded-xl">No</button></form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО НАСТРОЕК -->
<div id="edit-modal" class="hidden fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-xl p-10 rounded-[3rem] shadow-2xl overflow-y-auto max-h-[90vh]">
        <h2 class="text-2xl font-black text-stone-900 mb-6">Настройки компании</h2>
        <form th:action="@{/companies/my/update}" method="post" class="space-y-4">
            <div><label class="text-[10px] font-black uppercase text-stone-400 ml-2">Название</label><input type="text" name="name" th:value="${company.name}" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none"></div>
            <div><label class="text-[10px] font-black uppercase text-stone-400 ml-2">Email компании</label><input type="email" name="contactEmail" th:value="${company.contactEmail}" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none"></div>
            <div><label class="text-[10px] font-black uppercase text-stone-400 ml-2">Адрес (для карты)</label><input type="text" name="address" th:value="${company.address}" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none"></div>
            <div><label class="text-[10px] font-black uppercase text-stone-400 ml-2">URL логотипа</label><input type="text" name="logoUrl" th:value="${company.logoUrl}" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none"></div>
            <div><label class="text-[10px] font-black uppercase text-stone-400 ml-2">Описание</label><textarea name="description" th:text="${company.description}" rows="3" class="w-full px-5 py-3 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none"></textarea></div>
            <div class="pt-4 flex space-x-3">
                <button type="button" onclick="document.getElementById('edit-modal').classList.add('hidden')" class="flex-1 py-4 text-stone-400 font-bold uppercase">Отмена</button>
                <button type="submit" class="flex-1 py-4 bg-stone-900 text-white rounded-2xl font-bold">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Убираем уведомление через 4 сек
    setTimeout(() => {
        const toast = document.getElementById('toast');
        if(toast) { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }
    }, 4000);
</script>

</body>
</html>
