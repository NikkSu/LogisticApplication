<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 flex items-center justify-center min-h-screen">
<div class="text-center p-10 bg-white rounded-xl shadow-lg">
    <h1 class="text-6xl font-bold text-stone-800 mb-4">Упс!</h1>
    <p class="text-xl text-stone-600 mb-6">Произошла непредвиденная ошибка.</p>
    <div class="bg-amber-50 p-4 rounded border border-amber-200 mb-6 text-left">
        <code class="text-sm text-amber-900" th:text="${errorMessage}">Причина ошибки...</code>
    </div>
    <a href="/dashboard" class="bg-stone-800 text-white px-6 py-2 rounded-lg hover:bg-stone-900 transition">
        Вернуться на главную
    </a>
</div>
</body>
</html>
