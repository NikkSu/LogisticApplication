<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Что-то пошло не так | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        /* Декоративные пятна на фоне */
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.3;
            border-radius: 50%;
        }
        /* Анимация "плавания" коробки */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

<!-- Декор фона -->
<div class="blob w-[30rem] h-[30rem] bg-[#D4652F] -top-32 -left-32"></div>
<div class="blob w-[25rem] h-[25rem] bg-[#1E3A8A] -bottom-32 -right-32"></div>

<div class="w-full max-w-4xl mx-4">
    <div class="bg-white/80 backdrop-blur-xl p-10 md:p-16 rounded-[3.5rem] shadow-2xl shadow-stone-200/50 border border-white flex flex-col md:flex-row items-center gap-12 relative overflow-hidden">

        <!-- Левая часть: Иллюстрация -->
        <div class="w-full md:w-5/12 flex justify-center relative z-10">
            <div class="relative animate-float">
                <!-- Задний фон круга -->
                <div class="absolute inset-0 bg-[#1E3A8A]/5 rounded-full transform scale-125"></div>
                <!-- Иконка сломанной/потерянной коробки -->
                <div class="w-48 h-48 bg-white rounded-full shadow-lg border border-stone-100 flex items-center justify-center relative z-10">
                    <span class="text-7xl">📦</span>
                    <!-- Маленький красный значок вопроса -->
                    <div class="absolute -right-2 -top-2 w-12 h-12 bg-[#D4652F] text-white rounded-full flex items-center justify-center text-3xl font-black shadow-md transform rotate-12">
                        ?
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая часть: Текст ошибки -->
        <div class="w-full md:w-7/12 text-center md:text-left relative z-10">
            <div class="inline-block px-4 py-1.5 bg-red-50 text-red-500 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6 border border-red-100">
                Системный сбой
            </div>

            <h1 class="text-5xl md:text-6xl font-black text-stone-900 leading-tight tracking-tight mb-4">
                Груз <br/> <span class="text-[#D4652F]">потерян</span>
            </h1>

            <p class="text-stone-500 text-lg font-medium leading-relaxed mb-8">
                Похоже, мы не можем найти страницу или данные, которые вы запрашивали. Возможно, маршрут изменился или доступ ограничен.
            </p>

            <!-- Технические детали (Скрыты по умолчанию, открываются по клику для гиков) -->
            <div class="mb-10 text-left">
                <button onclick="document.getElementById('tech-details').classList.toggle('hidden')"
                        class="text-[10px] font-black uppercase tracking-widest text-[#1E3A8A] hover:text-blue-900 transition flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    Показать технические детали
                </button>

                <div id="tech-details" class="hidden mt-4">
                    <div class="bg-stone-50 border border-stone-200 p-4 rounded-2xl max-h-32 overflow-y-auto">
                        <code class="text-xs text-stone-600 font-mono leading-relaxed" th:text="${errorMessage != null ? errorMessage : 'Неизвестная ошибка сервера (NullPointerException или Route Not Found).'}">
                            Текст ошибки...
                        </code>
                    </div>
                </div>
            </div>

            <!-- Кнопки действий -->
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <button onclick="window.history.back()"
                        class="w-full sm:w-auto px-8 py-4 bg-white border-2 border-stone-200 text-stone-600 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:border-stone-300 hover:bg-stone-50 transition shadow-sm">
                    Вернуться назад
                </button>
                <a href="/dashboard"
                   class="w-full sm:w-auto px-10 py-4 bg-[#1E3A8A] text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-[#152c6e] transition shadow-xl shadow-blue-900/20 text-center border-2 border-[#1E3A8A]">
                    В главный хаб
                </a>
            </div>
        </div>

        <!-- Декоративные фоновые элементы карты -->
        <div class="absolute -bottom-20 -right-20 opacity-5 pointer-events-none">
            <svg width="400" height="400" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-width="0.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
        </div>
    </div>
</div>

</body>
</html>
