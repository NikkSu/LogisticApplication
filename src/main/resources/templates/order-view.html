<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Заказ №' + ${order.id}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        /* Анимация заполнения шкалы таймера */
        @keyframes fillProgress { 0% { width: 100%; } 100% { width: 0%; } }
        .progress-bar { animation: fillProgress 5s linear forwards; }
    </style>
</head>
<body class="py-10">

<div class="max-w-5xl mx-auto px-4 lg:px-8">
    <!-- Навигация -->
    <nav class="mb-10 flex justify-between items-center">
        <a href="/orders/my" class="group flex items-center text-stone-400 hover:text-[#1E3A8A] transition font-bold text-sm">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            К списку заказов
        </a>

        <!-- Кнопка PDF -->
        <a th:href="@{/orders/download/{id}(id=${order.id})}" class="bg-white border border-stone-200 text-stone-600 px-6 py-3 rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:border-[#1E3A8A] hover:text-[#1E3A8A] transition flex items-center shadow-sm">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Скачать счет
        </a>
    </nav>

    <!-- ПАНЕЛЬ УПРАВЛЕНИЯ ЗАКАЗОМ -->
    <div class="mb-10 flex flex-col md:flex-row gap-6 p-8 bg-white rounded-[2.5rem] border border-stone-100 shadow-sm items-center justify-between">
        <div>
            <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">Управление сделкой</p>
            <div class="flex items-center space-x-3">
                <span class="text-sm font-bold text-stone-800">Текущий статус:</span>
                <span th:class="${order.status.name() == 'DELIVERED' ? 'bg-green-100 text-green-700' : (order.status.name() == 'CANCELLED' ? 'bg-red-100 text-red-700' : 'bg-[#1E3A8A]/10 text-[#1E3A8A]')} + ' px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest'"
                      th:text="${order.status}"></span>
            </div>
        </div>

        <!-- КНОПКИ ДЛЯ ПОСТАВЩИКА -->
        <div th:if="${currentUser.company.id == order.supplierCompany.id}" class="flex gap-3 w-full md:w-auto">
            <form th:if="${order.status.name() == 'CREATED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="flex-1 md:flex-none">
                <input type="hidden" name="newStatus" value="CONFIRMED">
                <button class="w-full bg-[#1E3A8A] text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#152c6e] transition shadow-lg shadow-blue-900/20">
                    Принять в работу
                </button>
            </form>

            <form th:if="${order.status.name() == 'CONFIRMED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="flex-1 md:flex-none">
                <input type="hidden" name="newStatus" value="SHIPPED">
                <button class="w-full bg-[#D4652F] text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-[#b54d24] transition shadow-lg shadow-orange-900/20">
                    Отгрузить товар
                </button>
            </form>
        </div>

        <!-- КНОПКИ ДЛЯ ПОКУПАТЕЛЯ -->
        <div th:if="${currentUser.company.id == order.customerCompany.id}" class="flex gap-3 w-full md:w-auto">
            <form th:if="${order.status.name() == 'SHIPPED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post" class="flex-1 md:flex-none">
                <input type="hidden" name="newStatus" value="DELIVERED">
                <button class="w-full bg-green-600 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-green-700 transition shadow-lg shadow-green-900/20">
                    Подтвердить получение
                </button>
            </form>

            <!-- КНОПКА ОТМЕНЫ С ТАЙМЕРОМ -->
            <form th:if="${order.status.name() == 'CREATED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post" id="cancelForm" class="flex-1 md:flex-none">
                <input type="hidden" name="newStatus" value="CANCELLED">

                <!-- Обычная кнопка -->
                <button type="button" id="btnCancelInit" onclick="startCancelTimer()"
                        class="w-full bg-white text-red-500 border border-red-200 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-red-50 transition shadow-sm">
                    Отменить заказ
                </button>

                <!-- Состояние таймера (скрыто по умолчанию) -->
                <div id="btnCancelTimer" class="hidden relative overflow-hidden w-full bg-red-500 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest cursor-pointer group shadow-lg shadow-red-900/20" onclick="stopCancelTimer()">
                    <!-- Шкала прогресса -->
                    <div id="progressLine" class="absolute top-0 left-0 h-full bg-red-600 z-0"></div>
                    <!-- Текст -->
                    <span class="relative z-10 flex items-center justify-center group-hover:hidden">
                        Отмена через <span id="timerText" class="mx-1 text-sm">5</span> сек
                    </span>
                    <!-- Текст при наведении -->
                    <span class="relative z-10 items-center justify-center hidden group-hover:flex">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        Прервать отмену
                    </span>
                </div>
            </form>
        </div>
    </div>

    <!-- ТЕЛО ЗАКАЗА (СЧЕТ-ФАКТУРА) -->
    <div class="bg-white p-10 md:p-16 rounded-[3.5rem] shadow-sm border border-stone-100 relative overflow-hidden">

        <!-- Водяной знак статуса -->
        <div th:if="${order.status.name() == 'CANCELLED'}" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -rotate-12 opacity-5 pointer-events-none z-0">
            <span class="text-[150px] font-black text-red-900 uppercase">Отменен</span>
        </div>
        <div th:if="${order.status.name() == 'DELIVERED'}" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -rotate-12 opacity-5 pointer-events-none z-0">
            <span class="text-[150px] font-black text-green-900 uppercase">Оплачен</span>
        </div>

        <div class="relative z-10">
            <div class="flex flex-col md:flex-row justify-between border-b border-stone-100 pb-10 mb-10 gap-6">
                <div>
                    <h1 class="text-4xl font-black text-stone-900 mb-2 tracking-tight">ЗАКАЗ №[[${order.id}]]</h1>
                    <p class="text-stone-400 font-medium" th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy, HH:mm')}"></p>
                </div>
            </div>

            <!-- Контрагенты -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-12">
                <div class="bg-stone-50 p-6 rounded-3xl border border-stone-100">
                    <p class="text-[10px] font-black uppercase tracking-widest text-[#D4652F] mb-4">Покупатель</p>
                    <p class="text-2xl font-black text-stone-800 mb-2" th:text="${order.customerCompany.name}"></p>
                    <p class="text-sm font-medium text-stone-500" th:text="${order.customerCompany.address != null ? order.customerCompany.address : 'Адрес не указан'}"></p>
                </div>
                <div class="bg-stone-50 p-6 rounded-3xl border border-stone-100 text-left md:text-right">
                    <p class="text-[10px] font-black uppercase tracking-widest text-[#1E3A8A] mb-4">Поставщик</p>
                    <p class="text-2xl font-black text-stone-800 mb-2" th:text="${order.supplierCompany.name}"></p>
                    <p class="text-sm font-medium text-stone-500" th:text="${order.supplierCompany.contactEmail}"></p>
                </div>
            </div>

            <!-- Таблица товаров -->
            <div class="overflow-x-auto">
                <table class="w-full mb-10 min-w-[600px]">
                    <thead>
                    <tr class="text-left border-b border-stone-200 text-[10px] uppercase font-black tracking-widest text-stone-400">
                        <th class="py-5 px-4">Наименование</th>
                        <th class="py-5 px-4 text-right">Цена</th>
                        <th class="py-5 px-4 text-center">Кол-во</th>
                        <th class="py-5 px-4 text-right text-stone-800">Сумма</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-stone-100">
                    <tr th:each="item : ${items}" class="hover:bg-stone-50/50 transition">
                        <td class="py-6 px-4">
                            <p class="font-bold text-stone-800 text-lg" th:text="${item.product.name}"></p>
                        </td>
                        <td class="py-6 px-4 text-right text-stone-500 font-medium" th:text="${item.price + ' Б'}"></td>
                        <td class="py-6 px-4 text-center font-black text-stone-700 bg-stone-50/50 rounded-lg my-2 inline-block mx-auto min-w-[40px]" th:text="${item.quantity}"></td>
                        <td class="py-6 px-4 text-right font-black text-stone-900 text-lg" th:text="${item.price * item.quantity + ' Б'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Итог -->
            <div class="flex justify-end border-t-2 border-stone-900 pt-8 mt-8">
                <div class="text-right">
                    <p class="text-stone-400 text-[10px] uppercase tracking-widest font-black mb-2">Итого к оплате</p>
                    <p class="text-5xl font-black text-[#D4652F] tracking-tighter" th:text="${total + ' Б'}"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- СКРИПТ ТАЙМЕРА ОТМЕНЫ -->
<script>
    let cancelTimeout;
    let countdownInterval;

    function startCancelTimer() {
        const btnInit = document.getElementById('btnCancelInit');
        const btnTimer = document.getElementById('btnCancelTimer');
        const timerText = document.getElementById('timerText');
        const progressLine = document.getElementById('progressLine');
        const form = document.getElementById('cancelForm');

        let timeLeft = 5;

        // Прячем обычную кнопку, показываем таймер
        btnInit.classList.add('hidden');
        btnTimer.classList.remove('hidden');

        // Запускаем CSS анимацию линии
        progressLine.classList.add('progress-bar');

        // Отсчет цифр
        countdownInterval = setInterval(() => {
            timeLeft -= 1;
            timerText.innerText = timeLeft;
        }, 1000);

        // Отправка формы через 5 секунд
        cancelTimeout = setTimeout(() => {
            clearInterval(countdownInterval);
            form.submit();
        }, 5000);
    }

    function stopCancelTimer() {
        const btnInit = document.getElementById('btnCancelInit');
        const btnTimer = document.getElementById('btnCancelTimer');
        const timerText = document.getElementById('timerText');
        const progressLine = document.getElementById('progressLine');

        // Отменяем таймеры
        clearTimeout(cancelTimeout);
        clearInterval(countdownInterval);

        // Сбрасываем анимацию
        progressLine.classList.remove('progress-bar');
        timerText.innerText = '5';

        // Возвращаем обычную кнопку
        btnTimer.classList.add('hidden');
        btnInit.classList.remove('hidden');
    }
</script>

</body>
</html>
