<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Заказ №' + ${order.id}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="py-10">
<div class="max-w-4xl mx-auto px-4">
    <nav class="mb-8 flex justify-between items-center">
        <a href="/orders/my" class="text-stone-400 hover:text-stone-800 text-sm">← Назад к списку</a>


        <a th:href="@{/orders/download/{id}(id=${order.id})}" class="bg-stone-800 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-black transition flex items-center">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Скачать счет (PDF)
        </a>
    </nav>
    <div class="mb-8 flex flex-wrap gap-4 p-6 bg-stone-50 rounded-3xl border border-stone-100">
        <div class="flex-1">
            <p class="text-xs font-bold text-stone-400 uppercase mb-1">Управление заказом</p>
            <p class="text-sm text-stone-600">Текущий статус: <span class="font-bold text-amber-800">[[${order.status}]]</span></p>
        </div>

        <div th:if="${currentUser.company.id == order.supplierCompany.id}" class="flex gap-2">
            <form th:if="${order.status.name() == 'CREATED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post">
                <input type="hidden" name="newStatus" value="CONFIRMED">
                <button class="bg-stone-800 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-black transition">Принять в работу</button>
            </form>

            <form th:if="${order.status.name() == 'CONFIRMED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post">
                <input type="hidden" name="newStatus" value="SHIPPED">
                <button class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-blue-700 transition">Отгрузить товар</button>
            </form>
        </div>

        <div th:if="${currentUser.company.id == order.customerCompany.id}" class="flex gap-2">
            <form th:if="${order.status.name() == 'SHIPPED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post">
                <input type="hidden" name="newStatus" value="DELIVERED">
                <button class="bg-green-600 text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-green-700 transition">Подтвердить получение</button>
            </form>

            <form th:if="${order.status.name() == 'CREATED'}" th:action="@{/orders/{id}/status(id=${order.id})}" method="post">
                <input type="hidden" name="newStatus" value="CANCELLED">
                <button class="text-red-600 border border-red-100 px-6 py-2 rounded-xl text-sm font-bold hover:bg-red-50 transition">Отменить заказ</button>
            </form>
        </div>
    </div>
    <div class="bg-white p-12 rounded-3xl shadow-sm border border-stone-100">
        <div class="flex justify-between border-b border-stone-100 pb-10 mb-10">
            <div>
                <h1 class="text-3xl font-black text-stone-900 mb-2">ЗАКАЗ №[[${order.id}]]</h1>
                <p class="text-stone-400" th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}"></p>
            </div>
            <div class="text-right">
                <span class="px-4 py-1 rounded-full bg-amber-50 text-amber-800 font-bold text-xs uppercase tracking-widest" th:text="${order.status}"></span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-10 mb-10">
            <div>
                <p class="text-[10px] font-black uppercase text-stone-400 mb-2">Заказчик</p>
                <p class="font-bold text-stone-800" th:text="${order.customerCompany.name}"></p>
                <p class="text-sm text-stone-500" th:text="${order.customerCompany.address}"></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black uppercase text-stone-400 mb-2">Поставщик</p>
                <p class="font-bold text-stone-800" th:text="${order.supplierCompany.name}"></p>
                <p class="text-sm text-stone-500" th:text="${order.supplierCompany.contactEmail}"></p>
            </div>
        </div>

        <table class="w-full mb-10">
            <thead>
            <tr class="text-left border-b border-stone-50 text-[10px] uppercase font-bold text-stone-400">
                <th class="py-4">Наименование</th>
                <th class="py-4">Цена</th>
                <th class="py-4 text-center">Кол-во</th>
                <th class="py-4 text-right">Сумма</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-stone-50">
            <tr th:each="item : ${items}">
                <td class="py-6">
                    <p class="font-bold text-stone-800" th:text="${item.product.name}"></p>
                </td>
                <td class="py-6 text-stone-600" th:text="${item.price + ' Б'}"></td>
                <td class="py-6 text-center text-stone-600" th:text="${item.quantity}"></td>
                <td class="py-6 text-right font-bold text-stone-900" th:text="${item.price * item.quantity + 'Б'}"></td>
            </tr>
            </tbody>
        </table>

        <div class="flex justify-end border-t-2 border-stone-900 pt-6">
            <div class="text-right">
                <p class="text-stone-400 text-xs uppercase font-bold mb-1">Итого к оплате</p>
                <p class="text-4xl font-black text-stone-900" th:text="${total + ' Б'}"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
