<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои товары | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="py-10">

<div class="max-w-6xl mx-auto px-4">
    <nav class="mb-8 flex justify-between items-center">
        <a href="/dashboard" class="text-stone-400 hover:text-stone-800 text-sm">← На главную</a>
        <a href="/my-products/add" class="bg-amber-700 text-white px-6 py-2 rounded-xl font-bold hover:bg-amber-800 transition shadow-lg shadow-amber-900/20">
            + Добавить товар
        </a>
    </nav>

    <div class="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden">
        <div class="p-8 border-b border-stone-50">
            <h1 class="text-2xl font-bold text-stone-800">Управление ассортиментом</h1>
            <p class="text-stone-400 text-sm">Здесь вы можете редактировать цены и наличие ваших товаров</p>
        </div>

        <table class="w-full text-left">
            <thead class="bg-stone-50 text-stone-400 text-[10px] uppercase font-bold tracking-widest">
            <tr>
                <th class="px-8 py-4">Товар</th>
                <th class="px-8 py-4">Категория</th>
                <th class="px-8 py-4">Текущая цена</th>
                <th class="px-8 py-4 text-right">Действия</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-stone-50">
            <tr th:each="p : ${products}" class="hover:bg-stone-50/50 transition">
                <td class="px-8 py-4 flex items-center space-x-4">
                    <img th:src="${p.imageUrl}" class="w-10 h-10 rounded-lg object-cover bg-stone-100">
                    <span class="font-semibold text-stone-800" th:text="${p.name}"></span>
                </td>
                <td class="px-8 py-4 text-stone-500 text-sm" th:text="${p.category != null ? p.category.name : '—'}"></td>
                <td class="px-8 py-4 font-bold text-stone-800" th:text="${p.price + ' ₽'}"></td>
                <td class="px-8 py-4 text-right flex justify-end space-x-2">
                    <!-- Кнопка редактирования -->
                    <a th:href="@{/my-products/edit/{id}(id=${p.id})}" class="text-stone-400 hover:text-amber-700 p-2 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </a>

                </td>
                <td class="px-8 py-4 text-right space-x-2">
                    <!-- Кнопка удаления -->
                    <form th:action="@{/my-products/delete/{id}(id=${p.id})}" method="post" class="inline" onsubmit="return confirm('Удалить товар из каталога?');">
                        <button type="submit" class="text-red-400 hover:text-red-600 p-2 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${products.isEmpty()}" class="p-20 text-center text-stone-400 italic">
            У вас пока нет добавленных товаров
        </div>
    </div>
</div>

</body>
</html>
