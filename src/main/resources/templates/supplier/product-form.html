<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление товаром | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="py-12">

<div class="max-w-2xl mx-auto px-4">

    <!-- Быстрое добавление категории -->
    <div class="mb-8 bg-amber-50 p-6 rounded-3xl border border-amber-100">
        <h3 class="text-sm font-bold text-amber-900 mb-4 uppercase">Новая категория</h3>
        <form th:action="@{/my-products/categories/add}" method="post" class="flex space-x-2">
            <input type="text" name="categoryName" placeholder="Название категории..."
                   class="flex-1 px-4 py-2 rounded-xl border-none focus:ring-2 focus:ring-amber-700 outline-none text-sm">
            <button type="submit" class="bg-amber-700 text-white px-4 py-2 rounded-xl text-sm font-bold">Добавить</button>
        </form>
        <p th:if="${error}" class="text-red-600 text-xs mt-2" th:text="${error}"></p>
    </div>

    <div class="bg-white p-10 rounded-3xl shadow-xl border border-stone-100">
        <h2 class="text-3xl font-bold text-stone-800 mb-8"
            th:text="${product.id == null ? 'Новый товар' : 'Редактирование'}"></h2>

        <form th:action="@{/my-products/save}" th:object="${product}" method="post" class="space-y-6">
            <!-- Скрытое поле для ID (чтобы Spring понимал, что это редактирование, а не новый товар) -->
            <input type="hidden" th:field="*{id}">

            <div>
                <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Название товара</label>
                <input type="text" th:field="*{name}" required class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Категория</label>
                    <select th:field="*{category}" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none text-sm">
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Цена (₽)</label>
                    <input type="number" step="0.01" th:field="*{price}" required class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Описание товара</label>
                <textarea th:field="*{description}" rows="4" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none text-sm" placeholder="Расскажите о характеристиках товара..."></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-stone-400 uppercase mb-2">Ссылка на изображение</label>
                <input type="text" th:field="*{imageUrl}" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-none focus:ring-2 focus:ring-amber-700 outline-none text-sm" placeholder="https://...">
            </div>

            <div class="pt-6 border-t border-stone-50 flex items-center justify-between">
                <a href="/my-products" class="text-stone-400 text-sm hover:text-stone-800 transition">Отмена</a>
                <button type="submit" class="bg-stone-800 text-white px-10 py-3 rounded-xl font-bold hover:bg-stone-900 transition shadow-lg shadow-stone-200">
                    Сохранить изменения
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
