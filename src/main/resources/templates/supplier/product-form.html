<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление товаром | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FFF9F8; font-family: 'Inter', sans-serif; }
        .input-focus:focus { border-color: #D4652F; box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1); }
        .preview-box { background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="py-12 px-4">

<div class="max-w-6xl mx-auto">
    <!-- Навигация -->
    <nav class="mb-10 flex justify-between items-center">
        <a href="/my-products" class="group flex items-center text-stone-400 hover:text-[#1E3A8A] transition font-bold text-sm">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Назад к списку товаров
        </a>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">

        <!-- ЛЕВАЯ ПАНЕЛЬ: Превью и Категория (4 из 12) -->
        <div class="lg:col-span-4 space-y-6">

            <!-- Карточка превью -->
            <div class="bg-white p-6 rounded-[2.5rem] border border-stone-100 shadow-sm overflow-hidden">
                <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-stone-400 mb-6">Предпросмотр</h3>
                <div class="preview-box w-full aspect-square rounded-[2rem] bg-stone-50 border-2 border-dashed border-stone-200 flex items-center justify-center overflow-hidden mb-6">
                    <!-- Скрипт ниже будет обновлять эту картинку при вводе URL -->
                    <img id="image-preview" th:src="${product.imageUrl != null ? product.imageUrl : ''}"
                         th:class="${product.imageUrl != null ? 'w-full h-full object-cover' : 'hidden'}" />
                    <div id="image-placeholder" th:class="${product.imageUrl != null ? 'hidden' : 'text-stone-300 text-center p-8'}">
                        <svg class="w-12 h-12 mx-auto mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-[10px] font-bold uppercase tracking-widest">Изображение появится после ввода ссылки</p>
                    </div>
                </div>
                <div class="space-y-1">
                    <h4 id="preview-name" class="font-black text-stone-800 text-xl truncate" th:text="${product.name != null ? product.name : 'Название товара'}"></h4>
                    <p id="preview-price" class="text-[#D4652F] font-black text-2xl" th:text="${product.price != null ? product.price + ' Б' : '0.00 Б'}"></p>
                </div>
            </div>

            <!-- Виджет добавления категории -->
            <div class="bg-[#1E3A8A] p-8 rounded-[2.5rem] shadow-xl text-white relative overflow-hidden">
                <div class="relative z-10">
                    <h3 class="text-blue-300 text-[10px] font-black uppercase tracking-widest mb-4">Классификатор</h3>
                    <p class="text-sm font-medium mb-6">Не нашли нужную категорию? Добавьте её в систему:</p>
                    <form th:action="@{/my-products/categories/add}" method="post" class="space-y-3">
                        <input type="text" name="categoryName" placeholder="Новая категория..." required
                               class="w-full px-5 py-3 bg-white/10 border border-white/10 rounded-xl outline-none focus:bg-white/20 transition text-sm placeholder:text-blue-300">
                        <button type="submit" class="w-full py-3 bg-[#D4652F] text-white rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-[#b54d24] transition shadow-lg shadow-black/20">
                            Добавить категорию
                        </button>
                    </form>
                    <p th:if="${error}" class="text-orange-300 text-[10px] mt-3 font-bold uppercase" th:text="${error}"></p>
                </div>
                <div class="absolute -right-4 -bottom-4 text-white/5 text-7xl font-black italic">CAT</div>
            </div>
        </div>

        <!-- ПРАВАЯ ПАНЕЛЬ: Основная форма (8 из 12) -->
        <div class="lg:col-span-8">
            <div class="bg-white p-10 md:p-14 rounded-[3.5rem] shadow-sm border border-stone-100">
                <header class="mb-12">
                    <h2 class="text-4xl font-black text-stone-900 tracking-tight mb-2"
                        th:text="${product.id == null ? 'Новый товар' : 'Редактирование'}"></h2>
                    <p class="text-stone-400 font-medium">Заполните спецификации товара для публикации в каталоге</p>
                </header>

                <form th:action="@{/my-products/save}" th:object="${product}" method="post" class="space-y-8">
                    <input type="hidden" th:field="*{id}">

                    <!-- Основное -->
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Полное наименование</label>
                            <input type="text" th:field="*{name}" id="input-name" required placeholder="Например: Офисное кресло 'Ergo Pro'"
                                   class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-bold text-stone-800">
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Категория товара</label>
                                <select th:field="*{category}" class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-bold text-stone-800 cursor-pointer appearance-none">
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Стоимость (Бел. руб)</label>
                                <div class="relative">
                                    <input type="number" step="0.01" th:field="*{price}" id="input-price" required
                                           class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-black text-stone-900 text-lg shadow-inner">
                                    <span class="absolute right-6 top-1/2 -translate-y-1/2 font-black text-stone-300">Б</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Описание -->
                    <div class="space-y-2 pt-6 border-t border-stone-50">
                        <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest text-center block">Техническое описание и характеристики</label>
                        <textarea th:field="*{description}" rows="5" placeholder="Укажите размеры, материалы, гарантийный срок и другие важные детали..."
                                  class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-[2rem] outline-none input-focus transition-all font-medium text-stone-700 leading-relaxed shadow-inner"></textarea>
                    </div>

                    <!-- Медиа -->
                    <div class="space-y-2 pt-6 border-t border-stone-50">
                        <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">URL-адрес изображения</label>
                        <input type="text" th:field="*{imageUrl}" id="input-url" placeholder="https://example.com/photo.jpg"
                               class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-500 text-sm">
                    </div>

                    <!-- Кнопки -->
                    <div class="pt-10 flex flex-col sm:flex-row items-center justify-between gap-6 border-t border-stone-50">
                        <a href="/my-products" class="text-[10px] font-black uppercase tracking-widest text-stone-400 hover:text-stone-800 transition">Отменить изменения</a>
                        <button type="submit" class="w-full sm:w-auto px-12 py-5 bg-[#1E3A8A] text-white rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:bg-black transition shadow-xl shadow-blue-900/20 transform hover:-translate-y-1">
                            Опубликовать товар
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Маленький JS для живого превью -->
<script>
    const nameInp = document.getElementById('input-name');
    const priceInp = document.getElementById('input-price');
    const urlInp = document.getElementById('input-url');

    const namePrev = document.getElementById('preview-name');
    const pricePrev = document.getElementById('preview-price');
    const imgPrev = document.getElementById('image-preview');
    const placeholder = document.getElementById('image-placeholder');

    nameInp.addEventListener('input', (e) => namePrev.innerText = e.target.value || 'Название товара');
    priceInp.addEventListener('input', (e) => pricePrev.innerText = (e.target.value || '0.00') + ' Б');
    urlInp.addEventListener('input', (e) => {
        if(e.target.value) {
            imgPrev.src = e.target.value;
            imgPrev.classList.remove('hidden');
            imgPrev.classList.add('w-full', 'h-full', 'object-cover');
            placeholder.classList.add('hidden');
        } else {
            imgPrev.classList.add('hidden');
            placeholder.classList.remove('hidden');
        }
    });
</script>

</body>
</html>
