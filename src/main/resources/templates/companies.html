<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выбор компании | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .toggle-dot { transition: transform 0.3s ease; }
        .hidden { display: none; }
    </style>
</head>
<body class="py-12">

<div class="max-w-4xl mx-auto px-4">

    <!-- БЛОК ДЛЯ ТЕХ, КТО УЖЕ В КОМПАНИИ -->
    <div th:if="${userCompany != null}" class="text-center py-10">
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-amber-100 max-w-lg mx-auto">
            <div class="mb-6 flex justify-center">
                <!-- Твой "умный логотип" или буква -->
                <div th:if="${userCompany.logoUrl == null || userCompany.logoUrl.isEmpty()}"
                     class="w-24 h-24 rounded-2xl bg-stone-800 text-white flex items-center justify-center font-bold text-4xl"
                     th:text="${userCompany.name.substring(0,1)}"></div>
                <img th:if="${userCompany.logoUrl != null && !userCompany.logoUrl.isEmpty()}"
                     th:src="${userCompany.logoUrl}" class="w-24 h-24 rounded-2xl object-cover shadow-md">
            </div>

            <h2 class="text-2xl font-bold text-stone-800 mb-2">Вы уже состоите в компании</h2>
            <h3 class="text-xl text-amber-800 font-bold mb-6" th:text="${userCompany.name}">Название компании</h3>

            <div class="space-y-4">
                <a href="/dashboard" class="block w-full py-3 bg-stone-800 text-white rounded-xl font-bold hover:bg-stone-900 transition">
                    Перейти в Dashboard
                </a>
                <a href="/companies/my" class="block w-full py-3 border border-stone-200 text-stone-600 rounded-xl font-bold hover:bg-stone-50 transition">
                    Управление компанией
                </a>
            </div>
        </div>
    </div>

    <!-- БЛОК ВЫБОРА (ДЛЯ НОВИЧКОВ) -->
    <div th:if="${userCompany == null}">

        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-stone-800 mb-4">Партнеры системы</h1>
            <p class="text-stone-500">Выберите компанию, к которой хотите присоединиться</p>
        </div>

    <!-- ТОГГЛ -->
    <div class="flex flex-col items-center mb-12">
        <div class="flex items-center cursor-pointer select-none" onclick="toggleCompanies()">
            <span id="label-suppliers" class="mr-4 font-bold text-amber-900 transition">Поставщики</span>
            <div class="w-16 h-8 bg-stone-200 rounded-full p-1 relative shadow-inner">
                <div id="dot" class="toggle-dot w-6 h-6 bg-amber-800 rounded-full shadow-md translate-x-0"></div>
            </div>
            <span id="label-customers" class="ml-4 font-bold text-stone-400 transition">Заказчики</span>
        </div>
    </div>

    <!-- СПИСОК ПОСТАВЩИКОВ -->
    <div id="suppliers-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div th:each="comp : ${suppliers}" class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 flex items-center justify-between hover:shadow-md transition">
            <div class="flex items-center space-x-4">
                <!-- ЛОГИКА: ЛОГО ИЛИ БУКВА -->
                <img th:if="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}" th:src="${comp.logoUrl}" class="w-12 h-12 rounded-lg object-cover">
                <div th:unless="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}"
                     class="w-12 h-12 rounded-lg bg-amber-100 text-amber-800 flex items-center justify-center font-bold text-xl uppercase"
                     th:text="${comp.name.substring(0,1)}"></div>

                <div>
                    <h3 class="font-bold text-stone-800" th:text="${comp.name}"></h3>
                    <span class="text-[10px] uppercase font-bold text-amber-600">Поставщик</span>
                </div>
            </div>
            <form th:action="@{/companies/join/{id}(id=${comp.id})}" method="post"><button type="submit" class="bg-amber-50 px-4 py-2 rounded-lg text-sm font-bold text-amber-800 hover:bg-amber-100 transition">Вступить</button></form>
        </div>
    </div>

    <!-- СПИСОК ЗАКАЗЧИКОВ -->
    <div id="customers-list" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
        <div th:each="comp : ${customers}" class="bg-white p-6 rounded-2xl shadow-sm border border-stone-100 flex items-center justify-between hover:shadow-md transition">
            <div class="flex items-center space-x-4">
                <!-- ЛОГИКА: ЛОГО ИЛИ БУКВА -->
                <img th:if="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}" th:src="${comp.logoUrl}" class="w-12 h-12 rounded-lg object-cover">
                <div th:unless="${comp.logoUrl != null && !comp.logoUrl.isEmpty()}"
                     class="w-12 h-12 rounded-lg bg-stone-800 text-white flex items-center justify-center font-bold text-xl uppercase"
                     th:text="${comp.name.substring(0,1)}"></div>

                <div>
                    <h3 class="font-bold text-stone-800" th:text="${comp.name}"></h3>
                    <span class="text-[10px] uppercase font-bold text-stone-400">Заказчик</span>
                </div>
            </div>
            <form th:action="@{/companies/join/{id}(id=${comp.id})}" method="post"><button type="submit" class="bg-stone-50 px-4 py-2 rounded-lg text-sm font-bold text-stone-800 hover:bg-stone-100 transition">Вступить</button></form>
        </div>
    </div>

    <!-- Кнопка создания -->
    <div class="mt-16 text-center border-t pt-10">
        <a href="/companies/create" class="inline-block px-10 py-4 bg-stone-800 text-white rounded-2xl font-bold hover:bg-stone-900 transition shadow-xl">Зарегистрировать свою компанию</a>
    </div>
</div>

<script>
    function toggleCompanies() {
        const suppliersList = document.getElementById('suppliers-list');
        const customersList = document.getElementById('customers-list');
        const dot = document.getElementById('dot');
        const labelSuppliers = document.getElementById('label-suppliers');
        const labelCustomers = document.getElementById('label-customers');
        if (suppliersList.classList.contains('hidden')) {
            suppliersList.classList.remove('hidden'); customersList.classList.add('hidden');
            dot.style.transform = 'translateX(0px)';
            labelSuppliers.className = 'mr-4 font-bold text-amber-900 transition';
            labelCustomers.className = 'ml-4 font-bold text-stone-400 transition';
        } else {
            suppliersList.classList.add('hidden'); customersList.classList.remove('hidden');
            dot.style.transform = 'translateX(32px)';
            labelSuppliers.className = 'mr-4 font-bold text-stone-400 transition';
            labelCustomers.className = 'ml-4 font-bold text-stone-800 transition';
        }
    }
</script>
</body>
</html>
