<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' | Logistics Hub'"></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; }
        .btn-order { background-color: #8B4513; color: white; }
        .btn-order:hover { background-color: #5D2E0B; }
        .compare-card:hover { border-color: #D2B48C; }
    </style>
</head>
<body>

<nav class="bg-white shadow-sm py-4 px-8 mb-8">
    <a href="/dashboard" class="text-stone-500 hover:text-stone-800 flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Назад к поиску
    </a>
</nav>

<div class="max-w-6xl mx-auto px-4">
    <div class="flex flex-col md:row space-y-8 md:space-y-0 md:space-x-12 bg-white p-8 rounded-2xl shadow-sm border border-stone-100">

        <div class="w-full md:w-1/2">
            <img th:src="${product.imageUrl}" class="w-full rounded-xl shadow-inner border border-stone-50" alt="Product Image">
        </div>

        <div class="w-full md:w-1/2">
            <div class="mb-4">
                <span class="text-amber-700 text-sm font-bold uppercase tracking-widest"
                      th:text="${product.category != null ? product.category.name : 'Общее'}"></span>
                <h1 class="text-4xl font-bold text-stone-800 mt-2" th:text="${product.name}"></h1>
            </div>

            <div class="flex items-center space-x-4 mb-6">
                <div class="bg-stone-100 px-3 py-1 rounded-full text-sm text-stone-600">
                    Поставщик: <span class="font-bold" th:text="${product.supplier.name}"></span>
                </div>
            </div>

            <p class="text-stone-600 mb-8 leading-relaxed" th:text="${product.description}">
                Здесь будет описание товара, его характеристики и условия поставки...
            </p>

            <div class="border-t border-stone-100 pt-6">
                <div class="flex items-baseline space-x-2 mb-6">
                    <span class="text-3xl font-bold text-stone-900" th:text="${product.price + ' ₽'}"></span>
                    <span class="text-stone-400 text-sm">/ за единицу</span>
                </div>

                <button class="btn-order w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-amber-900/20 transition-all">
                    Добавить в заказ
                </button>
            </div>
        </div>
    </div>

    <div class="mt-16 mb-20">
        <h3 class="text-2xl font-bold text-stone-800 mb-8">Сравнение с похожими товарами</h3>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div th:each="sim : ${similarProducts}" class="compare-card bg-white p-6 rounded-xl border border-stone-200 transition-all">
                <h4 class="font-bold text-stone-800 mb-2" th:text="${sim.name}"></h4>
                <p class="text-sm text-stone-500 mb-4" th:text="'Поставщик: ' + ${sim.supplier.name}"></p>

                <div class="flex justify-between items-center border-t border-stone-50 pt-4">
                    <span class="font-bold text-amber-900" th:text="${sim.price + ' ₽'}"></span>

                    <span th:if="${sim.price < product.price}" class="text-green-600 text-xs font-bold">
                        ↓ Дешевле на <span th:text="${product.price - sim.price}"></span> ₽
                    </span>
                    <span th:if="${sim.price > product.price}" class="text-stone-400 text-xs">
                        ↑ Дороже на <span th:text="${sim.price - product.price}"></span> ₽
                    </span>
                </div>
                <a th:href="@{/product/{id}(id=${sim.id})}" class="block text-center mt-4 text-sm text-amber-800 font-semibold hover:underline">
                    Посмотреть
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
