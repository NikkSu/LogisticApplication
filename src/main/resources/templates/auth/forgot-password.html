<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Восстановление доступа | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-[3rem] shadow-xl border border-stone-100 w-full max-w-md text-center">
    <h2 class="text-3xl font-black text-stone-900 mb-2">Забыли пароль?</h2>
    <p class="text-stone-400 text-sm mb-10">Мы отправим временный пароль на вашу почту.</p>

    <!-- Сообщения об успехе/ошибке -->
    <div th:if="${message}" th:class="${messageType == 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'} + ' p-4 rounded-2xl mb-6 text-xs font-bold'" th:text="${message}"></div>

    <form th:action="@{/forgot-password}" method="post" class="space-y-6 text-left">
        <div>
            <label class="text-[10px] font-black uppercase text-stone-400 ml-2 mb-2 block">Ваш Email</label>
            <input type="email" name="email" required
                   class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none">
        </div>

        <button type="submit" class="w-full py-5 bg-stone-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-black transition shadow-lg">
            Получить пароль
        </button>

        <a href="/login" class="block text-center text-stone-400 text-xs font-bold hover:text-stone-800 transition">Я вспомнил пароль, войти</a>
    </form>
</div>

</body>
</html>
