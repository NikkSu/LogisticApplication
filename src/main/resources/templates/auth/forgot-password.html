<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Восстановление доступа | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FFF9F8;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.3;
            border-radius: 50%;
        }
        .input-focus:focus {
            border-color: #D4652F;
            box-shadow: 0 0 0 4px rgba(212, 101, 47, 0.1);
        }
        .btn-primary {
            background-color: #D4652F;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background-color: #b54d24;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(212, 101, 47, 0.4);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

<!-- Декор фона -->
<div class="blob w-96 h-96 bg-[#D4652F] -top-20 -left-20"></div>
<div class="blob w-80 h-80 bg-[#1E3A8A] -bottom-20 -right-20"></div>

<div class="bg-white p-10 md:p-14 rounded-[3rem] shadow-2xl shadow-stone-200/50 border border-white w-full max-w-md text-center relative z-10 m-4">

    <!-- Декоративная иконка замка -->
    <div class="mx-auto w-20 h-20 bg-[#FFF9F8] rounded-[2rem] flex items-center justify-center mb-8 border border-[#D4652F]/10 shadow-sm">
        <svg class="w-10 h-10 text-[#D4652F]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
    </div>

    <h2 class="text-3xl font-black text-stone-900 mb-2">Забыли пароль?</h2>
    <p class="text-stone-400 text-sm mb-10 leading-relaxed">Не волнуйтесь! Введите ваш Email, и мы пришлем временный пароль для входа</p>

    <!-- Сообщения об успехе/ошибке -->
    <div th:if="${message}"
         th:class="${messageType == 'success' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'} + ' border p-4 rounded-2xl mb-8 text-xs font-bold animate-pulse'"
         th:text="${message}">
    </div>

    <form th:action="@{/forgot-password}" method="post" class="space-y-6 text-left">
        <div class="space-y-1">
            <label class="block text-[10px] font-black uppercase text-stone-400 tracking-[0.1em] ml-2">Ваша почта</label>
            <input type="email" name="email" required placeholder="office@company.com"
                   class="w-full px-6 py-4 bg-stone-50 border-2 border-transparent rounded-2xl outline-none input-focus transition-all font-medium text-stone-800">
        </div>

        <button type="submit" class="btn-primary w-full py-5 rounded-2xl text-white font-extrabold text-sm uppercase tracking-widest mt-6">
            Получить пароль
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-stone-100">
        <a href="/login" class="flex items-center justify-center text-stone-400 text-xs font-bold hover:text-[#1E3A8A] transition group">
            <svg class="w-4 h-4 mr-1 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Я вспомнил пароль, войти
        </a>
    </div>
</div>

</body>
</html>
