<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый пароль | Logistics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #FDFBF7; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-[3rem] shadow-xl border border-stone-100 w-full max-w-md">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-black text-stone-900 mb-2">Новый пароль</h2>
        <p class="text-stone-400 text-sm">Придумайте сложный пароль для вашей безопасности.</p>
    </div>

    <form th:action="@{/auth/reset-password}" method="post" class="space-y-6">
        <input type="hidden" name="token" th:value="${token}">

        <div>
            <label class="block text-[10px] font-black uppercase text-stone-400 ml-2 mb-2">Придумайте пароль</label>
            <input type="password" name="password" required
                   class="w-full px-6 py-4 bg-stone-50 rounded-2xl border-none focus:ring-2 focus:ring-amber-700 outline-none font-medium">
        </div>

        <button type="submit" class="w-full py-5 bg-amber-700 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-amber-800 transition shadow-lg shadow-amber-900/20">
            Обновить и войти
        </button>
    </form>
</div>

</body>
</html>
