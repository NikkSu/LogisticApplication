spring.application.name=suppliers

spring.datasource.url=jdbc:mysql://localhost:3306/suppliers_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1903
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

